<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Fechamentos · Brascof</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f6f3;
    --surface:#fff;
    --surface2:#eef1ec;
    --ink:#1b2e22;
    --ink-soft:#6b7c6f;
    --ink-soft2:#9eb09f;
    --brown:#2d6a4f;
    --brown-dark:#1e3329;
    --sage:#52b788;
    --sage-light:#d8f3dc;
    --amber:#b45309;
    --amber-light:#fff3cd;
    --rust:#c0392b;
    --rust-light:#fde8e8;
    --info:#1a6ea3;
    --header-bg:#2d4a3e;
    --hairline:rgba(0,0,0,.08);
    --hairline-strong:#c8ddd2;
    --radius:10px;
    --radius-sm:7px;
    --mono:'DM Mono',monospace;
    --serif:'Fraunces',serif;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Segoe UI',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:var(--mono);}
  h1,h2,h3{font-family:var(--serif);font-weight:600;margin:0;}

  /* ---------- topbar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 40px;height:56px;
    background:var(--header-bg);
    position:sticky;top:0;z-index:200;
    box-shadow:0 1px 4px rgba(0,0,0,.15);
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand h1{font-size:18px;font-weight:600;color:#e8f0ec;}
  .brand span{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#8aab97;}
  .who{display:flex;align-items:center;gap:14px;font-size:12px;color:#8aab97;}
  .who button{
    border:1px solid rgba(255,255,255,.2);background:transparent;color:#c9dcd0;
    padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-size:12px;
  }
  .who button:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.08);}

  /* ---------- login ---------- */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);
  }
  .login-card{
    width:380px;background:var(--surface);border:1px solid var(--hairline-strong);
    border-radius:16px;padding:2.5rem 2rem;position:relative;
    box-shadow:0 4px 24px rgba(45,74,62,.08);
  }
  .login-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--brown);margin-bottom:8px;text-align:center;}
  .login-card h1{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:4px;text-align:center;}
  .login-card p{color:var(--ink-soft);font-size:12px;margin:0 0 24px;text-align:center;}
  .field{margin-bottom:16px;position:relative;}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--hairline-strong);border-radius:var(--radius-sm);
    font-family:inherit;font-size:13px;color:var(--ink);background:#fff;
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--brown);box-shadow:0 0 0 3px rgba(45,106,79,.08);
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;
    font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.01em;
  }
  .btn-primary{background:var(--brown);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--brown-dark);}
  .btn-ghost{background:transparent;border:1px solid var(--hairline-strong);color:var(--ink-soft);}
  .btn-ghost:hover{border-color:var(--brown);color:var(--brown);}
  .err{color:var(--rust);font-size:12.5px;margin-top:12px;background:var(--rust-light);border-radius:var(--radius-sm);padding:10px 12px;}

  /* ---------- layout ---------- */
  .shell{max-width:1680px;margin:0 auto;padding:32px 40px;}

  /* ---------- timbre da corretora ---------- */
  .letterhead{
    max-width:1680px;margin:24px auto 0;padding:0 40px;
  }
  .letterhead-inner{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    padding:22px 32px;display:flex;align-items:center;justify-content:center;gap:28px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .letterhead-logo{height:92px;max-width:180px;object-fit:contain;flex-shrink:0;}
  .letterhead-text{font-size:13px;color:var(--ink-soft);line-height:1.7;}
  .letterhead-text strong{display:block;font-size:21px;color:var(--ink);font-family:var(--serif);font-weight:600;margin-bottom:4px;letter-spacing:-.01em;}
  .letterhead-text div{font-size:12.5px;}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--hairline);margin-bottom:28px;}
  .tab{
    padding:10px 4px;margin-right:24px;font-size:13px;color:var(--ink-soft);cursor:pointer;
    border-bottom:2px solid transparent;font-weight:500;
  }
  .tab.active{color:var(--brown);border-bottom-color:var(--brown);font-weight:600;}

  /* ---------- form card ---------- */
  .section-card{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .section-head{
    display:flex;align-items:baseline;gap:10px;padding:16px 22px;
    border-bottom:1px solid var(--hairline);background:var(--surface2);
    border-radius:var(--radius) var(--radius) 0 0;
  }
  .section-num{font-family:var(--mono);font-size:12px;color:var(--brown);}
  .section-head h3{font-size:14px;color:var(--ink);}
  .section-body{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;}
  .section-body .full{grid-column:1 / -1;}
  @media(min-width:900px){.section-body{grid-template-columns:1fr 1fr 1fr;}}
  @media(max-width:640px){.section-body{grid-template-columns:1fr;}}

  .form-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:8px;padding-bottom:60px;}

  /* ---------- tabela de fechamentos ---------- */
  .table-wrap{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  table.fech-table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
  table.fech-table thead th{
    text-align:left;padding:11px 14px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);border-bottom:1px solid var(--hairline-strong);background:var(--surface2);
    font-weight:600;position:sticky;top:0;
  }
  table.fech-table tbody tr{border-bottom:1px solid var(--hairline);cursor:pointer;}
  table.fech-table tbody tr:hover{background:var(--surface2);}
  table.fech-table tbody tr:last-child{border-bottom:none;}
  table.fech-table td{padding:12px 14px;color:var(--ink);}
  table.fech-table td.strong{font-weight:600;color:var(--ink);}
  table.fech-table td.mono{font-family:var(--mono);}
  table.fech-table td.dim{color:var(--ink-soft);}

  /* ---------- lista ---------- */
  .list-item{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:16px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .list-item .meta{display:flex;flex-direction:column;gap:3px;}
  .list-item .meta .top{font-weight:600;font-size:14px;color:var(--ink);}
  .list-item .meta .sub{font-size:12.5px;color:var(--ink-soft);font-family:var(--mono);}
  .list-item .right{display:flex;align-items:center;gap:14px;}
  .value{font-family:var(--mono);font-size:14px;}

  .stamp{
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 10px;border-radius:20px;border:1px solid; font-weight:600;
  }
  .stamp.pendente{color:var(--amber);border-color:var(--amber);background:var(--amber-light);}
  .stamp.conferido{color:var(--brown);border-color:var(--sage);background:var(--sage-light);}
  .stamp.divergente{color:var(--rust);border-color:var(--rust);background:var(--rust-light);}

  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
  }
  .empty h3{color:var(--ink);margin-bottom:8px;font-size:17px;}
  .empty p{font-size:13px;max-width:360px;margin:0 auto;}

  .detail-panel{
    position:fixed;top:0;right:0;height:100vh;width:420px;max-width:92vw;background:var(--surface);
    border-left:1px solid var(--hairline-strong);box-shadow:-8px 0 24px rgba(0,0,0,.1);
    padding:28px 26px;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;z-index:50;
  }
  .detail-panel.open{transform:translateX(0);}
  .overlay{
    position:fixed;inset:0;background:rgba(27,46,34,.3);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:40;
  }
  .overlay.open{opacity:1;pointer-events:auto;}
  .detail-panel h3{font-size:17px;color:var(--ink);margin-bottom:2px;}
  .detail-panel .close{position:absolute;top:22px;right:22px;cursor:pointer;color:var(--ink-soft);font-size:20px;background:none;border:none;}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--hairline);font-size:13px;gap:12px;}
  .kv span:first-child{color:var(--ink-soft);}
  .kv span:last-child{text-align:right;font-family:var(--mono);}
  .kv-group-title{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--brown);margin:20px 0 4px;font-weight:600;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--header-bg);color:#e8f0ec;padding:12px 20px;border-radius:var(--radius-sm);
    font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .hidden{display:none !important;}
  .loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:6px;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

  /* ---------- autocomplete ---------- */
  .ac-list{
    position:absolute;left:0;right:0;top:100%;margin-top:4px;z-index:30;
    background:var(--surface);border:1px solid var(--hairline-strong);border-radius:var(--radius-sm);
    max-height:230px;overflow-y:auto;box-shadow:0 10px 24px rgba(0,0,0,.12);
  }
  .ac-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--hairline);}
  .ac-item:last-child{border-bottom:none;}
  .ac-item:hover{background:var(--surface2);}
  .ac-item .ac-name{font-size:13px;font-weight:600;color:var(--ink);}
  .ac-item .ac-sub{font-size:11.5px;color:var(--ink-soft);font-family:var(--mono);}
  .ac-empty{padding:10px 12px;font-size:12.5px;color:var(--ink-soft);}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="login-eyebrow">Fechamento · Cadastro</div>
    <h1>Portal de Fechamentos</h1>
    <p>Acesso restrito às corretoras cadastradas junto à Brascof.</p>
    <form id="loginForm">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="loginEmail" required autocomplete="username">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary" type="submit">Entrar</button>
      <div id="loginErr" class="err hidden"></div>
    </form>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <div class="topbar">
    <div class="brand">
      <h1>Portal de Fechamentos</h1>
      <span id="corretoraTag">·</span>
    </div>
    <div class="who">
      <span id="userEmail"></span>
      <button id="logoutBtn">Sair</button>
    </div>
  </div>

  <div id="letterheadWrap"></div>

  <div class="shell">
    <div class="tabs" id="tabs"></div>
    <div id="tabContent"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detailPanel"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIGURAÇÃO — troque pelos dados do seu projeto Supabase
   ============================================================ */
const SUPABASE_URL = 'https://krcjplwmwcfayhcnjlhs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_85vfMyD6qskk0oMr7p8Xfg_3TIOR591';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BRASCOF_INFO = {
  nome: 'BRASCOF LTDA',
  endereco: 'Alameda do Café, 209 - Salas 201 Jardim Andere',
  cidade: '37026-400 Varginha - MG',
  cnpj: '54.628.906/0001-84',
  insc_est: '004.863.067/0010'
};

const BRASCOF_BANK_INFO = {
  favorecido_nome: 'BRASCOF LTDA',
  favorecido_cnpj_cpf: '54.628.906/0001-84',
  favorecido_cidade: 'VARGINHA',
  banco: 'ITAÚ',
  agencia: '802',
  conta: '91693-2',
  pix: '54.628.906/0001-84'
};

function applyBrascofPayment(idPrefix, isVenda){
  Object.entries(BRASCOF_BANK_INFO).forEach(([key, value])=>{
    const inp = document.getElementById(idPrefix + key);
    if(!inp) return;
    inp.value = isVenda ? value : '';
  });
}

function updateRetiradaState(formRoot, isPosto){
  const body = formRoot.querySelector('.retirada-body');
  if(!body) return;
  body.querySelectorAll('input,select,textarea').forEach(inp=>{ inp.disabled = isPosto; });
  body.style.opacity = isPosto ? '0.4' : '1';
  body.style.pointerEvents = isPosto ? 'none' : 'auto';
}

let currentUser = null;
let currentProfile = null; // { corretora, role }
let currentTab = 'novo';
let fechamentosCache = [];
let contrapartesCache = [];
let armazensCache = [];
let corretoraConfigCache = []; // todas visíveis ao usuário (própria, ou todas se admin)
let myCorretoraConfig = null; // atalho para a config da própria corretora (corretor)

const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html!==undefined) e.innerHTML = html; return e; };

function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function fmtMoney(v){ return v==null ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function fmtDate(v){ if(!v) return '—'; const d = new Date(v+'T00:00:00'); return d.toLocaleDateString('pt-BR'); }

function onlyDigits(v){ return (v||'').replace(/\D/g,''); }
function formatCnpjCpf(v){
  const d = onlyDigits(v).slice(0,14);
  if(d.length <= 11){
    return d.replace(/^(\d{3})(\d)/,'$1.$2').replace(/^(\d{3})\.(\d{3})(\d)/,'$1.$2.$3').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  }
  return d.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2');
}
function formatCep(v){
  const d = onlyDigits(v).slice(0,8);
  return d.replace(/^(\d{5})(\d)/,'$1-$2');
}
function attachMask(inputEl, formatFn){
  inputEl.addEventListener('input', ()=>{
    const pos = inputEl.selectionStart;
    const before = inputEl.value.length;
    inputEl.value = formatFn(inputEl.value);
    const after = inputEl.value.length;
    inputEl.selectionEnd = Math.max(0, pos + (after - before));
  });
}

function formatMoneyLive(v){
  let raw = v.replace(/[^\d,]/g, '');
  const firstComma = raw.indexOf(',');
  if(firstComma !== -1) raw = raw.slice(0, firstComma+1) + raw.slice(firstComma+1).replace(/,/g, '');
  const parts = raw.split(',');
  let intPart = parts[0].replace(/^0+(?=\d)/, '');
  intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  let result = intPart;
  if(parts.length > 1) result += ',' + parts[1].slice(0,2);
  return result;
}
function formatMoneyBlur(v){
  const raw = v.replace(/[^\d,]/g, '');
  if(!raw) return '';
  const parts = raw.split(',');
  let intPart = (parts[0].replace(/^0+(?=\d)/, '') || '0');
  intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const dec = parts[1] ? parts[1].slice(0,2).padEnd(2,'0') : '00';
  return intPart + ',' + dec;
}
function formatIntegerLive(v){
  let digits = onlyDigits(v).replace(/^0+(?=\d)/, '');
  return digits.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}
function parseMoneyToNumber(str){
  if(!str) return null;
  const n = parseFloat(str.replace(/\./g,'').replace(',', '.'));
  return isNaN(n) ? null : n;
}
function parseIntegerToNumber(str){
  if(!str) return null;
  const n = parseInt(str.replace(/\./g,''), 10);
  return isNaN(n) ? null : n;
}
function attachMoneyMask(inputEl){
  inputEl.addEventListener('input', ()=>{ inputEl.value = formatMoneyLive(inputEl.value); });
  inputEl.addEventListener('blur', ()=>{ inputEl.value = formatMoneyBlur(inputEl.value); });
}
function attachIntegerMask(inputEl){
  inputEl.addEventListener('input', ()=>{ inputEl.value = formatIntegerLive(inputEl.value); });
}
function composeEndereco(item){
  const linha1 = [item.rua, item.numero].filter(Boolean).join(', ') + (item.bairro ? ' - ' + item.bairro : '');
  return [linha1.trim(), item.cep ? 'CEP ' + item.cep : ''].filter(Boolean).join(', ');
}
function composeCidadeUf(item){
  return [item.cidade, item.uf].filter(Boolean).join('/');
}

let bankListCache = null;
async function loadBankList(){
  if(bankListCache) return bankListCache;
  try {
    const res = await fetch('https://brasilapi.com.br/api/banks/v1');
    const data = await res.json();
    bankListCache = data
      .filter(b => b.code !== null && b.code !== undefined && (b.fullName || b.name))
      .map(b => ({ code: String(b.code).padStart(3,'0'), name: b.fullName || b.name }))
      .sort((a,b)=> a.code.localeCompare(b.code));
  } catch(e){
    bankListCache = [];
  }
  return bankListCache;
}

function attachBankAutocomplete(inputEl){
  const list = el('div','ac-list hidden');
  inputEl.parentElement.appendChild(list);

  function paint(banks, query){
    const q = query.trim().toLowerCase();
    if(!q){ list.classList.add('hidden'); list.innerHTML=''; return; }
    const matches = banks.filter(b => b.name.toLowerCase().includes(q) || b.code.includes(q)).slice(0,8);
    if(!matches.length){
      list.innerHTML = `<div class="ac-empty">Nenhum banco encontrado — pode digitar livremente.</div>`;
    } else {
      list.innerHTML = '';
      matches.forEach(b=>{
        const row = el('div','ac-item', `<div class="ac-name">${b.code} — ${b.name}</div>`);
        row.addEventListener('mousedown', (e)=>{ e.preventDefault(); inputEl.value = `${b.code} - ${b.name}`; list.classList.add('hidden'); });
        list.appendChild(row);
      });
    }
    list.classList.remove('hidden');
  }

  inputEl.addEventListener('input', async ()=>{
    const banks = await loadBankList();
    paint(banks, inputEl.value);
  });
  inputEl.addEventListener('focus', async ()=>{
    if(!inputEl.value) return;
    const banks = await loadBankList();
    paint(banks, inputEl.value);
  });
  inputEl.addEventListener('blur', ()=>setTimeout(()=>list.classList.add('hidden'), 120));
}

/* ---------------- AUTH ---------------- */
$('#loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email = $('#loginEmail').value.trim();
  const password = $('#loginPassword').value;
  $('#loginErr').classList.add('hidden');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    $('#loginErr').textContent = 'Não foi possível entrar: ' + error.message;
    $('#loginErr').classList.remove('hidden');
    return;
  }
  await afterLogin(data.user);
});

$('#logoutBtn').addEventListener('click', async ()=>{
  await sb.auth.signOut();
  location.reload();
});

async function afterLogin(user){
  currentUser = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !profile){
    $('#loginErr').textContent = 'Login válido, mas nenhum perfil de corretora foi encontrado para este usuário. Peça para a Brascof configurar seu acesso.';
    $('#loginErr').classList.remove('hidden');
    await sb.auth.signOut();
    return;
  }
  currentProfile = profile;
  $('#loginView').classList.add('hidden');
  $('#appView').classList.remove('hidden');
  $('#corretoraTag').textContent = profile.corretora + (profile.role === 'admin' ? ' · Brascof' : '');
  $('#userEmail').textContent = user.email;
  buildTabs();
  await Promise.all([loadFechamentos(), loadAuxData()]);
  renderLetterhead();
  renderTab();
}

function renderLetterhead(){
  const wrap = $('#letterheadWrap');
  wrap.innerHTML = '';
  if(currentProfile.role === 'admin') return; // admin lida com várias corretoras, sem timbre fixo
  const cfg = myCorretoraConfig;
  if(!cfg) return;
  const linhas = [
    cfg.endereco,
    [cfg.cidade_uf, cfg.cep ? 'CEP ' + cfg.cep : ''].filter(Boolean).join(' - '),
    cfg.telefone ? 'Telefone: ' + cfg.telefone : '',
    cfg.cnpj ? 'CNPJ: ' + cfg.cnpj : '',
    cfg.extra_texto
  ].filter(Boolean).map(l => `<div>${l}</div>`).join('');
  const outer = el('div','letterhead');
  outer.innerHTML = `
    <div class="letterhead-inner">
      ${cfg.logo_base64 ? `<img class="letterhead-logo" src="${cfg.logo_base64}" alt="Logo">` : ''}
      <div class="letterhead-text">
        <strong>${cfg.nome_completo || currentProfile.corretora}</strong>
        ${linhas}
      </div>
    </div>
  `;
  wrap.appendChild(outer);
}

async function checkSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session) await afterLogin(session.user);
}
checkSession();

/* ---------------- TABS ---------------- */
function buildTabs(){
  const tabsEl = $('#tabs'); tabsEl.innerHTML = '';
  const isAdmin = currentProfile.role === 'admin';
  const tabDefs = isAdmin
    ? [{id:'pendentes', label:'Pendentes'}, {id:'todos', label:'Todos os fechamentos'}, {id:'cadastros', label:'Cadastros'}]
    : [{id:'novo', label:'Novo fechamento'}, {id:'meus', label:'Meus fechamentos'}, {id:'cadastros', label:'Cadastros'}];
  if(!currentTab || !tabDefs.some(t=>t.id===currentTab)){
    currentTab = tabDefs[0].id;
  }
  tabDefs.forEach(t=>{
    const d = el('div', 'tab' + (t.id===currentTab?' active':''), t.label);
    d.dataset.tab = t.id;
    d.addEventListener('click', async ()=>{ currentTab = t.id; buildTabs(); await loadFechamentos(); renderTab(); });
    tabsEl.appendChild(d);
  });
}

function renderTab(){
  const c = $('#tabContent'); c.innerHTML = '';
  if(currentTab === 'novo') return renderForm(c);
  if(currentTab === 'meus') return renderList(c, fechamentosCache);
  if(currentTab === 'cadastros') return renderCadastrosView(c);
  if(currentTab === 'pendentes') return renderList(c, fechamentosCache.filter(f=>f.status==='pendente'));
  if(currentTab === 'todos') return renderList(c, fechamentosCache);
}

/* ---------------- DATA ---------------- */
async function loadFechamentos(){
  const { data, error } = await sb.from('fechamentos').select('*').order('created_at', { ascending:false });
  if(error){ toast('Erro ao carregar fechamentos: ' + error.message); return; }
  fechamentosCache = data || [];
}

async function loadAuxData(){
  const [cps, arms, cfgs] = await Promise.all([
    sb.from('contrapartes').select('*').order('nome'),
    sb.from('armazens').select('*').order('nome'),
    sb.from('corretora_config').select('*')
  ]);
  contrapartesCache = cps.data || [];
  armazensCache = arms.data || [];
  corretoraConfigCache = cfgs.data || [];
  myCorretoraConfig = corretoraConfigCache.find(c => c.corretora === currentProfile.corretora) || null;
}

async function upsertAuxRecords(payload){
  const corretora = currentProfile.corretora;
  const tasks = [];
  if(payload.vendedor_nome){
    tasks.push(sb.from('contrapartes').upsert({
      corretora,
      nome: payload.vendedor_nome,
      endereco: payload.vendedor_endereco,
      cidade: payload.vendedor_cidade,
      cnpj_cpf: payload.vendedor_cnpj_cpf,
      insc_est: payload.vendedor_insc_est
    }, { onConflict: 'corretora,nome' }));
  }
  if(payload.armazem_retirada_nome){
    tasks.push(sb.from('armazens').upsert({
      corretora,
      nome: payload.armazem_retirada_nome,
      endereco: payload.armazem_retirada_endereco,
      cidade: payload.armazem_retirada_cidade,
      cnpj: payload.armazem_retirada_cnpj
    }, { onConflict: 'corretora,nome' }));
  }
  if(payload.armazem_descarga_nome){
    tasks.push(sb.from('armazens').upsert({
      corretora,
      nome: payload.armazem_descarga_nome,
      endereco: payload.armazem_descarga_endereco,
      cidade: payload.armazem_descarga_cidade,
      cnpj: payload.armazem_descarga_cnpj
    }, { onConflict: 'corretora,nome' }));
  }
  if(tasks.length) await Promise.all(tasks);
  await loadAuxData();
}

function buildCorretoraConfigSection(){
  const outer = el('div');
  const card = el('div','section-card');
  card.appendChild(el('div','section-head', `<h3>Cabeçalho / timbre das corretoras</h3>`));
  const body = el('div','section-body');

  const wCorretora = el('div','field full');
  wCorretora.appendChild(el('label', null, 'Corretora *'));
  const inpCorretora = el('input'); inpCorretora.type = 'text'; inpCorretora.placeholder = 'nome exatamente igual ao cadastrado no login (profiles.corretora)';
  wCorretora.appendChild(inpCorretora);
  body.appendChild(wCorretora);

  const mkC = (label, full) => {
    const w = el('div','field' + (full ? ' full' : ''));
    w.appendChild(el('label', null, label));
    const inp = el('input'); inp.type = 'text';
    w.appendChild(inp);
    body.appendChild(w);
    return inp;
  };
  const inpNome = mkC('Nome completo (razão social)', true);
  const inpEndereco = mkC('Endereço', true);
  const inpCidadeUf = mkC('Cidade - UF');
  const inpCep = mkC('CEP'); attachMask(inpCep, formatCep);
  const inpTelefone = mkC('Telefone(s)');
  const inpCnpj = mkC('CNPJ'); attachMask(inpCnpj, formatCnpjCpf);
  const inpExtra = mkC('Texto extra (ex: Instagram, site)', true);

  const wLogo = el('div','field full');
  wLogo.appendChild(el('label', null, 'Logo (arquivo de imagem)'));
  const inpLogo = el('input'); inpLogo.type = 'file'; inpLogo.accept = 'image/*';
  wLogo.appendChild(inpLogo);
  const logoPreview = el('img'); logoPreview.style.cssText = 'height:50px;margin-top:10px;display:none;border:1px solid var(--hairline);border-radius:6px;padding:4px;';
  wLogo.appendChild(logoPreview);
  body.appendChild(wLogo);

  let logoBase64 = null;
  inpLogo.addEventListener('change', ()=>{
    const file = inpLogo.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      logoBase64 = e.target.result;
      logoPreview.src = logoBase64;
      logoPreview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  card.appendChild(body);

  const actions = el('div'); actions.style.cssText = 'padding:0 22px 22px;display:flex;justify-content:flex-end;';
  const saveBtn = el('button','btn btn-primary','Salvar timbre');
  saveBtn.type = 'button';
  actions.appendChild(saveBtn);
  card.appendChild(actions);

  const listTitle = el('div', null, 'Corretoras com timbre configurado');
  listTitle.style.cssText = 'font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--brown);margin:20px 0 10px;';
  const listWrap = el('div');

  function loadIntoForm(cfg){
    inpCorretora.value = cfg.corretora;
    inpNome.value = cfg.nome_completo || '';
    inpEndereco.value = cfg.endereco || '';
    inpCidadeUf.value = cfg.cidade_uf || '';
    inpCep.value = cfg.cep || '';
    inpTelefone.value = cfg.telefone || '';
    inpCnpj.value = cfg.cnpj || '';
    inpExtra.value = cfg.extra_texto || '';
    logoBase64 = cfg.logo_base64 || null;
    if(logoBase64){ logoPreview.src = logoBase64; logoPreview.style.display = 'block'; }
    else { logoPreview.style.display = 'none'; }
    toast('Carregado para edição — altere e clique em Salvar timbre.');
    wCorretora.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  function paintList(){
    listWrap.innerHTML = '';
    if(!corretoraConfigCache.length){
      listWrap.appendChild(el('div',null,'<span style="font-size:12.5px;color:var(--ink-soft);">Nenhum timbre cadastrado ainda.</span>'));
      return;
    }
    corretoraConfigCache.forEach(cfg=>{
      const row = el('div','list-item');
      const left = el('div');
      left.style.cssText = 'display:flex;align-items:center;gap:14px;flex:1;';
      left.innerHTML = `
        ${cfg.logo_base64 ? `<img src="${cfg.logo_base64}" style="height:36px;max-width:70px;object-fit:contain;">` : '<div style="width:70px;"></div>'}
        <div class="meta">
          <div class="top">${cfg.corretora}</div>
          <div class="sub">${cfg.nome_completo || '—'}</div>
        </div>
      `;
      const actions = el('div');
      actions.style.cssText = 'display:flex;gap:8px;flex-shrink:0;';
      const editBtn = el('button','btn btn-ghost','Editar');
      editBtn.type = 'button'; editBtn.style.cssText = 'padding:6px 12px;font-size:12px;';
      editBtn.addEventListener('click', ()=>loadIntoForm(cfg));
      const delBtn = el('button','btn btn-ghost','Excluir');
      delBtn.type = 'button'; delBtn.style.cssText = 'padding:6px 12px;font-size:12px;color:var(--rust);border-color:var(--rust-light);';
      delBtn.addEventListener('click', async ()=>{
        if(!confirm(`Excluir o timbre de "${cfg.corretora}"? Essa ação não pode ser desfeita.`)) return;
        delBtn.disabled = true; delBtn.textContent = 'Excluindo…';
        const { error } = await sb.from('corretora_config').delete().eq('id', cfg.id);
        if(error){ toast('Erro ao excluir: ' + error.message); delBtn.disabled = false; delBtn.textContent = 'Excluir'; return; }
        toast('Timbre excluído.');
        await loadAuxData();
        renderLetterhead();
        paintList();
      });
      actions.appendChild(editBtn); actions.appendChild(delBtn);
      row.appendChild(left); row.appendChild(actions);
      listWrap.appendChild(row);
    });
  }
  paintList();

  saveBtn.addEventListener('click', async ()=>{
    const corretora = inpCorretora.value.trim();
    if(!corretora){ toast('Preencha o nome da corretora.'); return; }
    const payload = {
      corretora,
      nome_completo: inpNome.value.trim() || null,
      endereco: inpEndereco.value.trim() || null,
      cidade_uf: inpCidadeUf.value.trim() || null,
      cep: inpCep.value.trim() || null,
      telefone: inpTelefone.value.trim() || null,
      cnpj: inpCnpj.value.trim() || null,
      extra_texto: inpExtra.value.trim() || null,
      logo_base64: logoBase64
    };
    saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';
    const { error } = await sb.from('corretora_config').upsert(payload, { onConflict:'corretora' });
    saveBtn.disabled = false; saveBtn.textContent = 'Salvar timbre';
    if(error){ toast('Erro ao salvar: ' + error.message); return; }
    toast('Timbre salvo.');
    await loadAuxData();
    renderLetterhead();
    paintList();
  });

  outer.appendChild(card);
  outer.appendChild(listTitle);
  outer.appendChild(listWrap);
  return outer;
}

async function fetchContasBancarias(contraparteId){
  const { data, error } = await sb.from('contas_bancarias').select('*').eq('contraparte_id', contraparteId).order('created_at');
  if(error){ toast('Erro ao carregar contas: ' + error.message); return []; }
  return data || [];
}

function renderBankAccountsPanel(wrapEl, contraparte){
  wrapEl.innerHTML = '<p style="font-size:12.5px;color:var(--ink-soft);padding:14px 0;">Carregando contas…</p>';
  fetchContasBancarias(contraparte.id).then(contas=>{
    wrapEl.innerHTML = '';
    const listEl = el('div');
    function paintContas(items){
      listEl.innerHTML = '';
      if(!items.length){
        listEl.appendChild(el('div', null, '<span style="font-size:12.5px;color:var(--ink-soft);">Nenhuma conta cadastrada ainda.</span>'));
        return;
      }
      items.forEach(c=>{
        const row = el('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--hairline);gap:12px;';
        row.innerHTML = `
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--brown-dark);">${c.rotulo || 'Conta'} ${c.favorecido_nome ? '· ' + c.favorecido_nome : ''}</div>
            <div style="font-size:12px;color:var(--ink-soft);font-family:var(--mono);">
              ${[c.banco, c.agencia && ('ag '+c.agencia), c.conta && ('cc '+c.conta), c.pix && ('pix '+c.pix)].filter(Boolean).join(' · ') || '—'}
            </div>
          </div>
        `;
        const delBtn = el('button','btn btn-ghost','Remover');
        delBtn.style.cssText = 'padding:5px 10px;font-size:11.5px;flex-shrink:0;';
        delBtn.addEventListener('click', async ()=>{
          delBtn.disabled = true;
          const { error } = await sb.from('contas_bancarias').delete().eq('id', c.id);
          if(error){ toast('Erro ao remover: ' + error.message); delBtn.disabled = false; return; }
          toast('Conta removida.');
          const updated = await fetchContasBancarias(contraparte.id);
          paintContas(updated);
        });
        row.appendChild(delBtn);
        listEl.appendChild(row);
      });
    }
    paintContas(contas);

    const addForm = el('div');
    addForm.style.cssText = 'margin-top:16px;padding-top:16px;border-top:1px solid var(--hairline-strong);display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;';
    const mk = (label, id, full) => {
      const w = el('div', 'field' + (full ? ' full' : ''));
      w.style.marginBottom = '0';
      w.appendChild(el('label', null, label));
      const inp = el('input'); inp.type='text'; inp.id = 'cb_' + id;
      w.appendChild(inp);
      addForm.appendChild(w);
      return inp;
    };
    mk('Rótulo (ex: Conta principal)', 'rotulo', true);
    mk('Favorecido (se diferente da empresa)', 'favorecido_nome', true);
    const cpfInput = mk('CNPJ/CPF do favorecido', 'favorecido_cnpj_cpf');
    attachMask(cpfInput, formatCnpjCpf);
    const bancoInp2 = mk('Banco', 'banco');
    attachBankAutocomplete(bancoInp2);
    mk('Agência', 'agencia');
    mk('Conta', 'conta');
    mk('PIX', 'pix', true);

    const addBtn = el('button','btn btn-ghost','+ Adicionar conta');
    addBtn.style.cssText = 'margin-top:14px;padding:8px 14px;font-size:12.5px;';
    addBtn.addEventListener('click', async ()=>{
      const payload = { contraparte_id: contraparte.id, corretora: contraparte.corretora };
      ['rotulo','favorecido_nome','favorecido_cnpj_cpf','banco','agencia','conta','pix'].forEach(k=>{
        payload[k] = document.getElementById('cb_'+k).value.trim() || null;
      });
      addBtn.disabled = true; addBtn.textContent = 'Salvando…';
      const { error } = await sb.from('contas_bancarias').insert(payload);
      addBtn.disabled = false; addBtn.textContent = '+ Adicionar conta';
      if(error){ toast('Erro ao salvar conta: ' + error.message); return; }
      toast('Conta bancária adicionada.');
      ['rotulo','favorecido_nome','favorecido_cnpj_cpf','banco','agencia','conta','pix'].forEach(k=>{
        document.getElementById('cb_'+k).value = '';
      });
      const updated = await fetchContasBancarias(contraparte.id);
      paintContas(updated);
    });

    wrapEl.appendChild(listEl);
    wrapEl.appendChild(addForm);
    wrapEl.appendChild(addBtn);
  });
}

function buildAuxSection(title, table, fieldsDef, opts={}){
  const outer = el('div');
  const card = el('div','section-card');
  const head = el('div','section-head', `<h3>${title}</h3>`);
  const body = el('div','section-body');
  const inputs = {};
  fieldsDef.forEach(fd=>{
    const w = el('div','field' + (fd.full ? ' full' : ''));
    w.appendChild(el('label', null, fd.label + (fd.required ? ' *' : '')));
    const inp = el('input'); inp.type = 'text';
    if(fd.placeholder) inp.placeholder = fd.placeholder;
    if(fd.maxlength) inp.maxLength = fd.maxlength;
    inputs[fd.id] = inp;
    if(fd.mask === 'cep') attachMask(inp, formatCep);
    if(fd.mask === 'doc') attachMask(inp, formatCnpjCpf);
    w.appendChild(inp);
    body.appendChild(w);
  });
  let globalCheck = null;
  if(opts.globalToggle && currentProfile.role === 'admin'){
    const gw = el('div','field full');
    gw.style.cssText = 'display:flex;align-items:center;gap:8px;';
    globalCheck = el('input'); globalCheck.type = 'checkbox'; globalCheck.id = table + '_global_check';
    globalCheck.style.cssText = 'width:auto;margin:0;';
    const glbl = el('label', null, 'Compartilhado — visível para todas as corretoras');
    glbl.style.cssText = 'margin:0;cursor:pointer;';
    glbl.setAttribute('for', globalCheck.id);
    gw.appendChild(globalCheck); gw.appendChild(glbl);
    body.appendChild(gw);
  }
  card.appendChild(head); card.appendChild(body);

  /* ---------- Contas bancárias inline (só para contrapartes) ---------- */
  let getBankRowsData = () => [];
  if(opts.bankAccounts){
    const bankHead = el('div','section-head', `<h3 style="font-size:13px;">Contas bancárias</h3>`);
    bankHead.style.cssText = 'border-top:1px solid var(--hairline);background:transparent;padding-top:20px;';
    const bankBody = el('div');
    bankBody.style.cssText = 'padding:16px 22px 4px;';
    const rowsWrap = el('div');
    bankBody.appendChild(rowsWrap);

    const addRowBtn = el('button','btn btn-ghost','+ Adicionar outra conta');
    addRowBtn.type = 'button';
    addRowBtn.style.cssText = 'padding:7px 14px;font-size:12px;margin:6px 0 18px;';
    bankBody.appendChild(addRowBtn);

    const rows = [];
    function addBankRow(){
      const rowCard = el('div');
      rowCard.style.cssText = 'border:1px solid var(--hairline);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:#fff;position:relative;';
      const grid = el('div');
      grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;';
      const mk = (label, key, full, placeholder) => {
        const w = el('div','field' + (full ? ' full' : ''));
        w.style.marginBottom = '0';
        w.appendChild(el('label', null, label));
        const inp = el('input'); inp.type = 'text';
        if(placeholder) inp.placeholder = placeholder;
        w.appendChild(inp);
        grid.appendChild(w);
        return inp;
      };
      const rotuloInp = mk('Rótulo (ex: Conta principal)', 'rotulo', true);
      const favNomeInp = mk('Favorecido', 'favorecido_nome', true, 'preenche com o nome/razão social se deixar em branco');
      const favDocInp = mk('CNPJ/CPF do favorecido', 'favorecido_cnpj_cpf');
      attachMask(favDocInp, formatCnpjCpf);
      const bancoInp = mk('Banco', 'banco');
      attachBankAutocomplete(bancoInp);
      const agenciaInp = mk('Agência', 'agencia');
      const contaInp = mk('Conta', 'conta');
      const pixInp = mk('PIX', 'pix', true);
      rowCard.appendChild(grid);

      const entry = { rotuloInp, favNomeInp, favDocInp, bancoInp, agenciaInp, contaInp, pixInp, rowCard };
      rows.push(entry);

      if(rows.length > 1){
        const rmBtn = el('button','btn btn-ghost','Remover conta');
        rmBtn.type = 'button';
        rmBtn.style.cssText = 'padding:5px 10px;font-size:11px;margin-top:12px;';
        rmBtn.addEventListener('click', ()=>{
          rowCard.remove();
          const idx = rows.indexOf(entry);
          if(idx > -1) rows.splice(idx, 1);
        });
        rowCard.appendChild(rmBtn);
      }
      rowsWrap.appendChild(rowCard);
    }
    addRowBtn.addEventListener('click', addBankRow);
    addBankRow();

    inputs.nome.addEventListener('input', ()=>{
      rows.forEach(r=>{ r.favNomeInp.placeholder = inputs.nome.value || 'preenche com o nome/razão social se deixar em branco'; });
    });

    getBankRowsData = () => rows.map(r=>({
      rotulo: r.rotuloInp.value.trim() || null,
      favorecido_nome: r.favNomeInp.value.trim() || inputs.nome.value.trim() || null,
      favorecido_cnpj_cpf: r.favDocInp.value.trim() || null,
      banco: r.bancoInp.value.trim() || null,
      agencia: r.agenciaInp.value.trim() || null,
      conta: r.contaInp.value.trim() || null,
      pix: r.pixInp.value.trim() || null,
    })).filter(r => r.banco || r.agencia || r.conta || r.pix);

    card.appendChild(bankHead);
    card.appendChild(bankBody);

    outer._resetBankRows = () => {
      rowsWrap.innerHTML = '';
      rows.length = 0;
      addBankRow();
    };
  }

async function updatePaymentSection(formRoot, idPrefix, contraparteItem){
  const body = formRoot.querySelector('.payment-body');
  if(!body) return;
  const oldPicker = body.querySelector('.conta-picker-wrap');
  if(oldPicker) oldPicker.remove();

  const fillAccount = (c)=>{
    const map = { favorecido_nome:'favorecido_nome', favorecido_cnpj_cpf:'favorecido_cnpj_cpf', banco:'banco', agencia:'agencia', conta:'conta', pix:'pix' };
    Object.entries(map).forEach(([src,target])=>{
      const inp = document.getElementById(idPrefix+target);
      if(!inp) return;
      if(c){ inp.value = c[src] || ''; }
      else { inp.value = target === 'favorecido_nome' ? (contraparteItem.nome || '') : ''; }
    });
  };

  const contas = await fetchContasBancarias(contraparteItem.id);
  if(!contas.length){ fillAccount(null); return; }
  if(contas.length === 1){ fillAccount(contas[0]); return; }

  const wrap = el('div','field full conta-picker-wrap');
  wrap.appendChild(el('label', null, `Conta bancária cadastrada (${contas.length} encontradas)`));
  const select = el('select');
  contas.forEach((c,i)=>{
    const o = el('option', null, (c.rotulo || 'Conta ' + (i+1)) + (c.favorecido_nome ? ' — ' + c.favorecido_nome : ''));
    o.value = c.id;
    select.appendChild(o);
  });
  select.addEventListener('change', ()=>{
    fillAccount(contas.find(c=>c.id===select.value));
  });
  wrap.appendChild(select);
  body.insertBefore(wrap, body.firstChild);
  fillAccount(contas[0]);
}

  saveBtn.style.cssText = 'padding:6px 12px;font-size:12px;';
  btnRow.appendChild(cancelBtn); btnRow.appendChild(saveBtn);

  saveBtn.addEventListener('mousedown', async (e)=>{

    const payload = { corretora: currentProfile.corretora, nome, cidade: cidadeInp.value.trim() || null };
    if(table === 'contrapartes') payload.cnpj_cpf = docInp.value.trim() || null;
    else payload.cnpj = docInp.value.trim() || null;
    saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';

  });

  return wrap;

function attachAutocomplete(inputEl, cfg, idPrefix, formRoot){
  const list = el('div','ac-list hidden');
  inputEl.parentElement.appendChild(list);
  let quickAddOpen = false;

  function fillFrom(item){
    const values = cfg.fillFn(item);
    Object.entries(values).forEach(([targetSuffix, value])=>{
      const targetInput = document.getElementById(idPrefix + targetSuffix);
      if(targetInput) targetInput.value = value;
    });
    if(cfg.cache === 'contrapartes' && formRoot) updatePaymentSection(formRoot, idPrefix, item);
  }

  function paint(query){
    const q = query.trim().toLowerCase();
    if(!q){ list.classList.add('hidden'); list.innerHTML=''; return; }
    const cache = cfg.cache === 'contrapartes' ? contrapartesCache : armazensCache;
    const matches = cache.filter(item => (item.nome||'').toLowerCase().includes(q)).slice(0,6);
    list.innerHTML = '';
    if(!matches.length){
      list.appendChild(el('div','ac-empty', `Nenhum cadastro encontrado para "${inputEl.value.trim()}".`));
      const addBtn = el('button','btn btn-ghost','+ Cadastrar agora, sem sair daqui');
      addBtn.type = 'button';
      addBtn.style.cssText = 'margin:2px 12px 12px;padding:6px 12px;font-size:12px;';
      addBtn.addEventListener('mousedown', (e)=>{
        e.preventDefault();
        quickAddOpen = true;
        list.innerHTML = '';
        list.appendChild(buildQuickAddForm(cfg, inputEl.value.trim(), (savedItem)=>{
          quickAddOpen = false;
          if(savedItem){ fillFrom(savedItem); inputEl.value = savedItem.nome; }
          list.classList.add('hidden');
          list.innerHTML = '';
        }));
      });
      list.appendChild(addBtn);
    } else {
      matches.forEach(item=>{
        const row = el('div','ac-item', `<div class="ac-name">${item.nome}${item.global ? ' · <span style="color:var(--sage);">compartilhado</span>' : ''}</div><div class="ac-sub">${[item.cidade, item.cnpj_cpf||item.cnpj].filter(Boolean).join(' · ')}</div>`);
        row.addEventListener('mousedown', (e)=>{ e.preventDefault(); fillFrom(item); list.classList.add('hidden'); });
        list.appendChild(row);
      });
    }
    list.classList.remove('hidden');
  }

  inputEl.addEventListener('input', ()=>paint(inputEl.value));
  inputEl.addEventListener('focus', ()=>{ if(inputEl.value) paint(inputEl.value); });
  inputEl.addEventListener('blur', ()=>{
    if(quickAddOpen) return;
    setTimeout(()=>{ if(!quickAddOpen) list.classList.add('hidden'); }, 150);
  });
}

function renderForm(container){
  const form = el('form');
  FORM_SECTIONS.forEach(sec=>{
    const card = el('div','section-card');
    const head = el('div','section-head', `<span class="section-num">${sec.num}</span><h3${sec.num==='02' ? ' class="op-dependent-head"' : ''}>${sec.title}</h3>`);
    const body = el('div','section-body' + (sec.num==='06' ? ' payment-body' : '') + (sec.num==='03' ? ' retirada-body' : ''));
    if(sec.num === '03'){
      const checkWrap = el('div','field full');
      checkWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
      const check = el('input'); check.type = 'checkbox'; check.id = 'f_armazem_retirada_mesmo';
      check.style.cssText = 'width:auto;margin:0;';
      const lbl = el('label', null, 'Retirada é no mesmo endereço do vendedor/comprador (contraparte)');
      lbl.style.cssText = 'margin:0;cursor:pointer;';
      lbl.setAttribute('for', 'f_armazem_retirada_mesmo');
      checkWrap.appendChild(check); checkWrap.appendChild(lbl);
      body.appendChild(checkWrap);
      check.addEventListener('change', ()=>{
        const nomeInput = form.querySelector('#f_armazem_retirada_nome');
        if(nomeInput) nomeInput.disabled = check.checked;
        body.querySelectorAll('.field').forEach(w=>{
          if(w === checkWrap) return;
          w.style.opacity = check.checked ? '0.4' : '1';
        });
      });
    }
    sec.fields.forEach(f=>{
      const wrap = el('div', 'field' + (f.full ? ' full' : '') + (f.hidden ? ' hidden' : ''));
      wrap.appendChild(el('label', null, f.label + (f.required ? ' *' : '')));
      let input;
      if(f.type === 'textarea'){
        input = el('textarea'); input.rows = 3;
      } else if(f.type === 'select'){
        input = el('select');
        f.options.forEach(opt=>{
          const o = el('option', null, opt.label); o.value = opt.value;
          input.appendChild(o);
        });
        if(f.default !== undefined) input.value = f.default;
      } else {
        input = el('input');
        input.type = f.type;
        if(f.step) input.step = f.step;
      }
      input.id = 'f_' + f.id;
      input.name = f.id;
      if(f.placeholder) input.placeholder = f.placeholder;
      if(f.required) input.required = true;
      if(f.mask === 'doc') attachMask(input, formatCnpjCpf);
      if(f.mask === 'money') attachMoneyMask(input);
      if(f.mask === 'integer') attachIntegerMask(input);
      wrap.appendChild(input);
      body.appendChild(wrap);
      const cfg = PICKER_CONFIG[sec.num];
      if(cfg && f.id === cfg.fieldMap.nome) attachAutocomplete(input, cfg, 'f_', form);
    });
    card.appendChild(head); card.appendChild(body);
    form.appendChild(card);
  });

  const opSelect = form.querySelector('#f_tipo_operacao');
  const opHead = form.querySelector('.op-dependent-head');
  function syncOpHead(){
    opHead.textContent = opSelect.value === 'venda' ? 'Comprador (contraparte)' : 'Vendedor (contraparte)';
  }
  opSelect.addEventListener('change', ()=>{
    syncOpHead();
    applyBrascofPayment('f_', opSelect.value === 'venda');
  });
  syncOpHead();

  const modalidadeSelect = form.querySelector('#f_modalidade');
  if(modalidadeSelect){
    modalidadeSelect.addEventListener('change', ()=>{
      updateRetiradaState(form, modalidadeSelect.value === 'FATURADO/POSTO');
    });
    updateRetiradaState(form, modalidadeSelect.value === 'FATURADO/POSTO');
  }

  const actions = el('div','form-actions');
  const submitBtn = el('button','btn btn-primary','Cadastrar fechamento');
  submitBtn.type = 'submit';
  actions.appendChild(submitBtn);
  form.appendChild(actions);

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const payload = { corretora: currentProfile.corretora, user_id: currentUser.id };
    FORM_SECTIONS.forEach(sec=>sec.fields.forEach(f=>{
      const raw = $('#f_'+f.id).value;
      if(raw === '') { payload[f.id] = null; return; }
      if(f.mask === 'money') payload[f.id] = parseMoneyToNumber(raw);
      else if(f.mask === 'integer') payload[f.id] = parseIntegerToNumber(raw);
      else payload[f.id] = (f.type === 'number') ? Number(raw) : raw;
    }));
    const mesmoRetirada = $('#f_armazem_retirada_mesmo');
    if(mesmoRetirada && mesmoRetirada.checked){
      payload.armazem_retirada_nome = payload.vendedor_nome;
      payload.armazem_retirada_endereco = payload.vendedor_endereco;
      payload.armazem_retirada_cidade = payload.vendedor_cidade;
      payload.armazem_retirada_cnpj = payload.vendedor_cnpj_cpf;
    }
    submitBtn.disabled = true; submitBtn.textContent = 'Enviando…';
    const { error } = await sb.from('fechamentos').insert(payload);
    submitBtn.disabled = false; submitBtn.textContent = 'Cadastrar fechamento';
    if(error){ toast('Erro ao cadastrar: ' + error.message); return; }
    toast('Fechamento cadastrado — aguardando conferência da Brascof.');
    form.reset();
    await Promise.all([loadFechamentos(), upsertAuxRecords(payload)]);
  });

  container.appendChild(form);
}

      tableWrap.style.border = 'none';
      tableWrap.appendChild(el('div','empty', `
        <h3>Nenhum fechamento encontrado</h3>
        <p>Ajuste a busca ou aguarde novos cadastros aparecerem aqui.</p>
      `));
      return;
    }
    tableWrap.style.border = '';
    const table = el('table','fech-table');
    table.innerHTML = `
      <thead><tr>
        <th>Contrato</th>
        <th>Tipo</th>
        <th>Contraparte</th>
        <th>Corretora</th>
        <th>Modalidade</th>
        <th>Safra</th>
        <th>Sacas</th>
        <th>Preço/saca</th>
        <th>Vencimento</th>
        <th>Status</th>
      </tr></thead>
    `;
    const tbody = el('tbody');
    filtered.forEach(f=>{
      const tr = el('tr');
      tr.innerHTML = `
        <td class="mono strong">${f.numero_compra_brc || f.numero_contrato_corretora || '—'}</td>
        <td class="dim">${f.tipo_operacao === 'venda' ? 'Venda' : 'Compra'}</td>
        <td class="strong">${f.vendedor_nome || '—'}</td>
        <td class="dim">${f.corretora}</td>
        <td class="dim">${f.modalidade || '—'}</td>
        <td class="mono dim">${f.safra || '—'}</td>
        <td class="mono">${f.quantidade_sacas}</td>
        <td class="mono">${fmtMoney(f.preco_por_saca)}</td>
        <td class="mono dim">${fmtDate(f.data_retirada_limite)}</td>
        <td></td>
      `;
      tr.lastElementChild.appendChild(el('span','stamp ' + f.status, f.status));
      tr.addEventListener('click', ()=>openDetail(f));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    tableWrap.innerHTML = '';
    tableWrap.appendChild(table);
  }

  paint(items);

  $('#searchInput').addEventListener('input', (e)=>{
    const q = e.target.value.trim().toLowerCase();
    if(!q){ paint(items); return; }
    const filtered = items.filter(f =>
      (f.vendedor_nome||'').toLowerCase().includes(q) ||
      (f.corretora||'').toLowerCase().includes(q) ||
      (f.numero_compra_brc||'').toLowerCase().includes(q) ||
      (f.numero_contrato_corretora||'').toLowerCase().includes(q) ||
      (f.safra||'').toLowerCase().includes(q)
    );
    paint(filtered);
  });
}

/* ---------------- DETAIL PANEL ---------------- */
function kv(label, value){ return `<div class="kv"><span>${label}</span><span>${value ?? '—'}</span></div>`; }

function openDetail(f){
  const panel = $('#detailPanel'); const overlay = $('#overlay');
  const isAdmin = currentProfile.role === 'admin';
  panel.innerHTML = `
    <button class="close" id="closeDetail">&times;</button>
    <h3>${f.vendedor_nome || 'Fechamento'}</h3>
    <div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;">
      <div class="stamp ${f.status}" style="display:inline-block;">${f.status}</div>
      ${f.status === 'conferido'
        ? '<button id="downloadPdfBtn" class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">Baixar PDF</button>'
        : '<button class="btn btn-ghost" disabled style="padding:6px 12px;font-size:12px;opacity:.45;cursor:not-allowed;">Baixar PDF</button>'}
      ${canEdit(f) ? '<button id="editBtn" class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">Editar</button>' : ''}
    </div>
    ${f.status !== 'conferido' ? '<p style="font-size:11.5px;color:var(--ink-soft);margin:6px 0 0;">O PDF libera assim que a Brascof conferir o fechamento.</p>' : ''}

    <div class="kv-group-title">Identificação</div>
    ${kv('Operação', f.tipo_operacao === 'venda' ? 'Brascof vendedora (BRV)' : 'Brascof compradora (BRC)')}
    ${kv('Contrato corretora', f.numero_contrato_corretora)}
    ${kv('Nº compra/venda', f.numero_compra_brc)}
    ${kv('Corretora', f.corretora)}
    ${kv('Data fechamento', fmtDate(f.data_fechamento))}

    ${(() => {
      const contraparteLabel = f.tipo_operacao === 'venda' ? 'Comprador (contraparte)' : 'Vendedor (contraparte)';
      const brascofLabel = f.tipo_operacao === 'venda' ? 'Vendedor' : 'Comprador';
      const brascofBlock = `
        <div class="kv-group-title">${brascofLabel} (Brascof)</div>
        ${kv('Nome', BRASCOF_INFO.nome)}
        ${kv('Endereço', BRASCOF_INFO.endereco)}
        ${kv('Cidade', BRASCOF_INFO.cidade)}
        ${kv('CNPJ', BRASCOF_INFO.cnpj)}
        ${kv('Insc. estadual', BRASCOF_INFO.insc_est)}
      `;
      const contraparteBlock = `
        <div class="kv-group-title">${contraparteLabel}</div>
        ${kv('Nome', f.vendedor_nome)}
        ${kv('Endereço', f.vendedor_endereco)}
        ${kv('Cidade', f.vendedor_cidade)}
        ${kv('CNPJ/CPF', f.vendedor_cnpj_cpf)}
        ${kv('Insc. estadual', f.vendedor_insc_est)}
      `;
      return f.tipo_operacao === 'venda'
        ? contraparteBlock + brascofBlock
        : brascofBlock + contraparteBlock;
    })()}

    <div class="kv-group-title">Condições</div>
    ${kv('Sacas', f.quantidade_sacas)}
    ${kv('Preço/saca', fmtMoney(f.preco_por_saca))}
    ${kv('Modalidade', f.modalidade)}
    ${kv('Safra', f.safra)}
    ${kv('Qualidade', f.descricao_qualidade)}
    ${kv('Retirada até', fmtDate(f.data_retirada_limite) + (f.data_retirada_obs ? ' · ' + f.data_retirada_obs : ''))}
    ${kv('Pagamento', f.data_pagamento)}
    ${kv('Corretagem C/V', (f.corretagem_comprador_pct ?? '—') + '% / ' + (f.corretagem_vendedor_pct ?? '—') + '%')}

    <div class="kv-group-title">Pagamento</div>
    ${kv('Favorecido', f.favorecido_nome)}
    ${kv('Banco/Ag/Conta', [f.banco,f.agencia,f.conta].filter(Boolean).join(' / '))}
    ${kv('PIX', f.pix)}

    ${f.observacoes ? `<div class="kv-group-title">Observações</div><div style="font-size:13px;color:var(--ink-soft);">${f.observacoes}</div>` : ''}

    <div id="adminActions" style="margin-top:24px;"></div>
  `;
  $('#closeDetail').addEventListener('click', closeDetail);
  overlay.addEventListener('click', closeDetail);
  const pdfBtn = $('#downloadPdfBtn');
  if(pdfBtn) pdfBtn.addEventListener('click', ()=>generatePdf(f));
  const editBtn = $('#editBtn');
  if(editBtn) editBtn.addEventListener('click', ()=>openEditForm(f));

  if(isAdmin && f.status !== 'conferido'){
    const box = $('#adminActions');
    const confirmBtn = el('button','btn btn-primary','Marcar como conferido');
    confirmBtn.style.marginRight = '10px';
    const divergBtn = el('button','btn btn-ghost','Marcar divergência');
    box.appendChild(confirmBtn); box.appendChild(divergBtn);

    confirmBtn.addEventListener('click', async ()=>{
      await updateStatus(f.id, 'conferido');
    });
    divergBtn.addEventListener('click', async ()=>{
      const nota = prompt('Descreva a divergência encontrada:');
      if(nota === null) return;
      await updateStatus(f.id, 'divergente', nota);
    });
  }

  panel.classList.add('open'); overlay.classList.add('open');
}
function closeDetail(){ $('#detailPanel').classList.remove('open'); $('#overlay').classList.remove('open'); }

function canEdit(f){
  if(currentProfile.role === 'admin') return true;
  return f.corretora === currentProfile.corretora && (f.status === 'pendente' || f.status === 'divergente');
}

function openEditForm(f){
  const panel = $('#detailPanel');
  panel.innerHTML = `<button class="close" id="closeDetail">&times;</button><h3>Editar fechamento</h3><p style="font-size:12.5px;color:var(--ink-soft);margin:4px 0 20px;">${f.vendedor_nome || ''}</p><div id="editSections"></div>`;
  $('#closeDetail').addEventListener('click', closeDetail);
  const wrap = $('#editSections');

  FORM_SECTIONS.forEach(sec=>{
    const card = el('div','section-card');
    const head = el('div','section-head', `<span class="section-num">${sec.num}</span><h3${sec.num==='02' ? ' class="op-dependent-head"' : ''}>${sec.title}</h3>`);
    const body = el('div','section-body' + (sec.num==='06' ? ' payment-body' : '') + (sec.num==='03' ? ' retirada-body' : ''));
    let retiradaMesmoInicial = false;
    if(sec.num === '03'){
      const checkWrap = el('div','field full');
      checkWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
      const check = el('input'); check.type = 'checkbox'; check.id = 'e_armazem_retirada_mesmo';
      check.style.cssText = 'width:auto;margin:0;';
      retiradaMesmoInicial = !!(f.armazem_retirada_nome && f.armazem_retirada_nome === f.vendedor_nome);
      check.checked = retiradaMesmoInicial;
      const lbl = el('label', null, 'Retirada é no mesmo endereço do vendedor/comprador (contraparte)');
      lbl.style.cssText = 'margin:0;cursor:pointer;';
      lbl.setAttribute('for', 'e_armazem_retirada_mesmo');
      checkWrap.appendChild(check); checkWrap.appendChild(lbl);
      body.appendChild(checkWrap);
      check.addEventListener('change', ()=>{
        const nomeInput = wrap.querySelector('#e_armazem_retirada_nome');
        if(nomeInput) nomeInput.disabled = check.checked;
        body.querySelectorAll('.field').forEach(w=>{
          if(w === checkWrap) return;
          w.style.opacity = check.checked ? '0.4' : '1';
        });
      });
    }
    sec.fields.forEach(fld=>{
      const fieldWrap = el('div', 'field' + (fld.full ? ' full' : '') + (fld.hidden ? ' hidden' : ''));
      fieldWrap.appendChild(el('label', null, fld.label));
      let input;
      if(fld.type === 'textarea'){ input = el('textarea'); input.rows = 3; }
      else if(fld.type === 'select'){
        input = el('select');
        fld.options.forEach(opt=>{
          const o = el('option', null, opt.label); o.value = opt.value;
          input.appendChild(o);
        });
      }
      else { input = el('input'); input.type = fld.type; if(fld.step) input.step = fld.step; }
      input.id = 'e_' + fld.id;
      const val = f[fld.id];
      if(val !== null && val !== undefined){
        if(fld.mask === 'money') input.value = formatMoneyBlur(String(val).replace('.', ','));
        else if(fld.mask === 'integer') input.value = formatIntegerLive(String(val));
        else input.value = val;
      }
      if(fld.mask === 'doc') attachMask(input, formatCnpjCpf);
      if(fld.mask === 'money') attachMoneyMask(input);
      if(fld.mask === 'integer') attachIntegerMask(input);
      fieldWrap.appendChild(input);
      body.appendChild(fieldWrap);
      const cfg = PICKER_CONFIG[sec.num];
      if(cfg && fld.id === cfg.fieldMap.nome) attachAutocomplete(input, cfg, 'e_', wrap);
    });
    if(sec.num === '03' && retiradaMesmoInicial){
      const nomeInput = body.querySelector('#e_armazem_retirada_nome');
      if(nomeInput) nomeInput.disabled = true;
      body.querySelectorAll('.field').forEach(w=>{ w.style.opacity = '0.4'; });
      const checkWrap = body.querySelector('#e_armazem_retirada_mesmo').closest('.field');
      if(checkWrap) checkWrap.style.opacity = '1';
    }
    card.appendChild(head); card.appendChild(body);
    wrap.appendChild(card);
  });

  const opSelectEdit = wrap.querySelector('#e_tipo_operacao');
  const opHeadEdit = wrap.querySelector('.op-dependent-head');
  function syncOpHeadEdit(){
    opHeadEdit.textContent = opSelectEdit.value === 'venda' ? 'Comprador (contraparte)' : 'Vendedor (contraparte)';
  }
  opSelectEdit.addEventListener('change', ()=>{
    syncOpHeadEdit();
    applyBrascofPayment('e_', opSelectEdit.value === 'venda');
  });
  syncOpHeadEdit();

  const modalidadeSelectEdit = wrap.querySelector('#e_modalidade');
  if(modalidadeSelectEdit){
    modalidadeSelectEdit.addEventListener('change', ()=>{
      updateRetiradaState(wrap, modalidadeSelectEdit.value === 'FATURADO/POSTO');
    });
    updateRetiradaState(wrap, modalidadeSelectEdit.value === 'FATURADO/POSTO');
  }

  const actions = el('div','form-actions');
  actions.style.paddingBottom = '20px';
  const cancelBtn = el('button','btn btn-ghost','Cancelar');
  cancelBtn.type = 'button';
  cancelBtn.addEventListener('click', ()=>openDetail(f));
  const saveBtn = el('button','btn btn-primary','Salvar alterações');
  saveBtn.type = 'button';
  saveBtn.addEventListener('click', async ()=>{
    const payload = {};
    FORM_SECTIONS.forEach(sec=>sec.fields.forEach(fld=>{
      const raw = $('#e_'+fld.id).value;
      if(raw === ''){ payload[fld.id] = null; return; }
      if(fld.mask === 'money') payload[fld.id] = parseMoneyToNumber(raw);
      else if(fld.mask === 'integer') payload[fld.id] = parseIntegerToNumber(raw);
      else payload[fld.id] = (fld.type === 'number') ? Number(raw) : raw;
    }));
    const mesmoRetiradaEdit = $('#e_armazem_retirada_mesmo');
    if(mesmoRetiradaEdit && mesmoRetiradaEdit.checked){
      payload.armazem_retirada_nome = payload.vendedor_nome;
      payload.armazem_retirada_endereco = payload.vendedor_endereco;
      payload.armazem_retirada_cidade = payload.vendedor_cidade;
      payload.armazem_retirada_cnpj = payload.vendedor_cnpj_cpf;
    }
    if(currentProfile.role !== 'admin' && f.status === 'divergente'){
      payload.status = 'pendente';
      payload.obs_conferencia = null;
    }
    saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';
    const { error } = await sb.from('fechamentos').update(payload).eq('id', f.id);
    saveBtn.disabled = false; saveBtn.textContent = 'Salvar alterações';
    if(error){ toast('Erro ao salvar: ' + error.message); return; }
    toast(payload.status === 'pendente' ? 'Corrigido e reenviado para conferência.' : 'Fechamento atualizado.');
    await Promise.all([loadFechamentos(), upsertAuxRecords(payload)]);
    const updated = fechamentosCache.find(x=>x.id===f.id) || f;
    renderTab();
    openDetail(updated);
  });
  actions.appendChild(cancelBtn); actions.appendChild(saveBtn);
  wrap.appendChild(actions);
}

function generatePdf(f){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const marginX = 48;
  let y = 56;
  const brown = [45,106,79];
  const inkSoft = [107,124,111];
  const line = () => { doc.setDrawColor(216,227,220); doc.line(marginX, y, 547, y); y += 18; };
  const heading = (txt) => {
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(45,106,79);
    doc.text(txt.toUpperCase(), marginX, y); y += 16;
    doc.setDrawColor(216,227,220); doc.line(marginX, y-6, 547, y-6);
  };
  const row = (label, value) => {
    if(value === null || value === undefined || value === '') value = '—';
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(...inkSoft);
    doc.text(String(label), marginX, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(27,46,34);
    doc.text(String(value), 300, y);
    y += 16;
  };

  const cfg = corretoraConfigCache.find(c => c.corretora === f.corretora);
  if(cfg && (cfg.logo_base64 || cfg.nome_completo)){
    let logoHeight = 0;
    if(cfg.logo_base64){
      const match = cfg.logo_base64.match(/^data:image\/(png|jpe?g);base64,/i);
      const format = match ? match[1].toUpperCase().replace('JPG','JPEG') : 'PNG';
      try{ doc.addImage(cfg.logo_base64, format, marginX, y, 70, 50); logoHeight = 50; }
      catch(e){ /* logo inválida, segue sem ela */ }
    }
    const textX = cfg.logo_base64 ? marginX + 82 : marginX;
    let ty = y + 10;
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(27,46,34);
    doc.text(cfg.nome_completo || f.corretora, textX, ty); ty += 15;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...inkSoft);
    [cfg.endereco, [cfg.cidade_uf, cfg.cep ? 'CEP '+cfg.cep : ''].filter(Boolean).join(' - '), cfg.telefone, cfg.cnpj ? 'CNPJ '+cfg.cnpj : '', cfg.extra_texto]
      .filter(Boolean).forEach(txt=>{ doc.text(txt, textX, ty); ty += 12; });
    y = Math.max(y + logoHeight, ty) + 12;
    doc.setDrawColor(216,227,220); doc.line(marginX, y, 547, y); y += 22;
  }

  doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(...brown);
  doc.text(`Fechamento de ${f.tipo_operacao === 'venda' ? 'Venda' : 'Compra'} — Brascof`, marginX, y); y += 8;
  doc.setDrawColor(...brown); doc.setLineWidth(1.2); doc.line(marginX, y, 547, y); y += 26;
  doc.setLineWidth(0.5);

  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...inkSoft);
  doc.text(`Status: ${f.status.toUpperCase()}   ·   Gerado em ${new Date().toLocaleDateString('pt-BR')}`, marginX, y);
  y += 24;

  heading('Identificação'); y += 8;
  row('Operação', f.tipo_operacao === 'venda' ? 'Brascof vendedora (BRV)' : 'Brascof compradora (BRC)');
  row('Corretora', f.corretora);
  row('Contrato corretora', f.numero_contrato_corretora);
  row('Nº compra/venda', f.numero_compra_brc);
  row('Data fechamento', fmtDate(f.data_fechamento));
  y += 10;

  const contraparteLabel = f.tipo_operacao === 'venda' ? 'Comprador (contraparte)' : 'Vendedor (contraparte)';
  const brascofLabel = f.tipo_operacao === 'venda' ? 'Vendedor' : 'Comprador';
  const drawBrascofBlock = () => {
    heading(brascofLabel + ' (Brascof)'); y += 8;
    row('Nome', BRASCOF_INFO.nome);
    row('Endereço', BRASCOF_INFO.endereco);
    row('Cidade', BRASCOF_INFO.cidade);
    row('CNPJ', BRASCOF_INFO.cnpj);
    row('Insc. estadual', BRASCOF_INFO.insc_est);
    y += 10;
  };
  const drawContraparteBlock = () => {
    heading(contraparteLabel); y += 8;
    row('Nome / razão social', f.vendedor_nome);
    row('Endereço', f.vendedor_endereco);
    row('Cidade', f.vendedor_cidade);
    row('CNPJ/CPF', f.vendedor_cnpj_cpf);
    row('Insc. estadual', f.vendedor_insc_est);
    y += 10;
  };
  if(f.tipo_operacao === 'venda'){ drawContraparteBlock(); drawBrascofBlock(); }
  else { drawBrascofBlock(); drawContraparteBlock(); }

  heading('Armazéns'); y += 8;
  if(f.modalidade !== 'FATURADO/POSTO'){
    row('Retirada', [f.armazem_retirada_nome, f.armazem_retirada_cidade].filter(Boolean).join(' — '));
  }
  row('Descarga', [f.armazem_descarga_nome, f.armazem_descarga_cidade].filter(Boolean).join(' — '));
  y += 10;

  heading('Condições comerciais'); y += 8;
  row('Quantidade', f.quantidade_sacas + ' sacas');
  row('Preço por saca', fmtMoney(f.preco_por_saca));
  row('Modalidade', f.modalidade);
  row('Safra', f.safra);
  row('Embalagem', f.embalagem);
  row('Qualidade', f.descricao_qualidade);
  row('Retirada até', fmtDate(f.data_retirada_limite) + (f.data_retirada_obs ? ' · ' + f.data_retirada_obs : ''));
  row('Pagamento', f.data_pagamento);
  row('Corretagem comprador/vendedor', (f.corretagem_comprador_pct ?? '—') + '% / ' + (f.corretagem_vendedor_pct ?? '—') + '%');
  y += 10;

  heading('Dados para pagamento'); y += 8;
  row('Favorecido', f.favorecido_nome);
  row('CNPJ/CPF', f.favorecido_cnpj_cpf);
  row('Cidade', f.favorecido_cidade);
  row('Banco / Agência / Conta', [f.banco, f.agencia, f.conta].filter(Boolean).join(' / '));
  row('PIX', f.pix);

  if(f.observacoes){
    y += 10;
    heading('Observações'); y += 8;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(27,46,34);
    const split = doc.splitTextToSize(f.observacoes, 500);
    doc.text(split, marginX, y);
    y += split.length * 13;
  }

  if(f.status === 'divergente' && f.obs_conferencia){
    y += 14;
    heading('Divergência apontada pela Brascof'); y += 8;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(192,57,43);
    const split = doc.splitTextToSize(f.obs_conferencia, 500);
    doc.text(split, marginX, y);
  }

  const fileSafe = (f.numero_compra_brc || f.numero_contrato_corretora || f.id).replace(/[^\w-]+/g,'_');
  doc.save(`fechamento_${fileSafe}.pdf`);
}

async function updateStatus(id, status, obs_conferencia){
  const payload = { status, conferido_por: currentUser.id, conferido_em: new Date().toISOString() };
  if(obs_conferencia !== undefined) payload.obs_conferencia = obs_conferencia;
  const { error } = await sb.from('fechamentos').update(payload).eq('id', id);
  if(error){ toast('Erro ao atualizar: ' + error.message); return; }
  toast('Status atualizado.');
  closeDetail();
  await loadFechamentos();
  renderTab();
}
</script>
