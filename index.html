<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Fechamentos · Brascof</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f6f3;
    --surface:#fff;
    --surface2:#eef1ec;
    --ink:#1b2e22;
    --ink-soft:#6b7c6f;
    --ink-soft2:#9eb09f;
    --brown:#2d6a4f;
    --brown-dark:#1e3329;
    --sage:#52b788;
    --sage-light:#d8f3dc;
    --amber:#b45309;
    --amber-light:#fff3cd;
    --rust:#c0392b;
    --rust-light:#fde8e8;
    --info:#1a6ea3;
    --header-bg:#2d4a3e;
    --hairline:rgba(0,0,0,.08);
    --hairline-strong:#c8ddd2;
    --radius:10px;
    --radius-sm:7px;
    --mono:'DM Mono',monospace;
    --serif:'Fraunces',serif;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Segoe UI',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:var(--mono);}
  h1,h2,h3{font-family:var(--serif);font-weight:600;margin:0;}

  /* ---------- topbar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 40px;height:56px;
    background:var(--header-bg);
    position:sticky;top:0;z-index:200;
    box-shadow:0 1px 4px rgba(0,0,0,.15);
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand h1{font-size:18px;font-weight:600;color:#e8f0ec;}
  .brand span{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#8aab97;}
  .who{display:flex;align-items:center;gap:14px;font-size:12px;color:#8aab97;}
  .who button{
    border:1px solid rgba(255,255,255,.2);background:transparent;color:#c9dcd0;
    padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-size:12px;
  }
  .who button:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.08);}

  /* ---------- login ---------- */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);
  }
  .login-card{
    width:380px;background:var(--surface);border:1px solid var(--hairline-strong);
    border-radius:16px;padding:2.5rem 2rem;position:relative;
    box-shadow:0 4px 24px rgba(45,74,62,.08);
  }
  .login-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--brown);margin-bottom:8px;text-align:center;}
  .login-card h1{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:4px;text-align:center;}
  .login-card p{color:var(--ink-soft);font-size:12px;margin:0 0 24px;text-align:center;}
  .field{margin-bottom:16px;position:relative;}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--hairline-strong);border-radius:var(--radius-sm);
    font-family:inherit;font-size:13px;color:var(--ink);background:#fff;
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--brown);box-shadow:0 0 0 3px rgba(45,106,79,.08);
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;
    font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.01em;
  }
  .btn-primary{background:var(--brown);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--brown-dark);}
  .btn-ghost{background:transparent;border:1px solid var(--hairline-strong);color:var(--ink-soft);}
  .btn-ghost:hover{border-color:var(--brown);color:var(--brown);}
  .err{color:var(--rust);font-size:12.5px;margin-top:12px;background:var(--rust-light);border-radius:var(--radius-sm);padding:10px 12px;}

  /* ---------- layout ---------- */
  .shell{max-width:1680px;margin:0 auto;padding:32px 40px;}

  /* ---------- timbre da corretora ---------- */
  .letterhead{
    max-width:1680px;margin:24px auto 0;padding:0 40px;
  }
  .letterhead-inner{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    padding:22px 32px;display:flex;align-items:center;justify-content:center;gap:28px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .letterhead-logo{height:92px;max-width:180px;object-fit:contain;flex-shrink:0;}
  .letterhead-text{font-size:13px;color:var(--ink-soft);line-height:1.7;}
  .letterhead-text strong{display:block;font-size:21px;color:var(--ink);font-family:'Segoe UI',Arial,sans-serif;font-weight:700;margin-bottom:4px;}
  .letterhead-text div{font-size:12.5px;}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--hairline);margin-bottom:28px;}
  .tab{
    padding:10px 4px;margin-right:24px;font-size:13px;color:var(--ink-soft);cursor:pointer;
    border-bottom:2px solid transparent;font-weight:500;
  }
  .tab.active{color:var(--brown);border-bottom-color:var(--brown);font-weight:600;}

  /* ---------- form card ---------- */
  .section-card{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .section-head{
    display:flex;align-items:baseline;gap:10px;padding:16px 22px;
    border-bottom:1px solid var(--hairline);background:var(--surface2);
    border-radius:var(--radius) var(--radius) 0 0;
  }
  .section-num{font-family:var(--mono);font-size:12px;color:var(--brown);}
  .section-head h3{font-size:14px;color:var(--ink);}
  .section-body{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;}
  .section-body .full{grid-column:1 / -1;}
  @media(min-width:900px){.section-body{grid-template-columns:1fr 1fr 1fr;}}
  @media(max-width:640px){.section-body{grid-template-columns:1fr;}}

  .form-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:8px;padding-bottom:60px;}

  /* ---------- tabela de fechamentos ---------- */
  .table-wrap{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  table.fech-table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
  table.fech-table thead th{
    text-align:left;padding:11px 14px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);border-bottom:1px solid var(--hairline-strong);background:var(--surface2);
    font-weight:600;position:sticky;top:0;
  }
  table.fech-table tbody tr{border-bottom:1px solid var(--hairline);cursor:pointer;}
  table.fech-table tbody tr:hover{background:var(--surface2);}
  table.fech-table tbody tr:last-child{border-bottom:none;}
  table.fech-table td{padding:12px 14px;color:var(--ink);}
  table.fech-table td.strong{font-weight:600;color:var(--ink);}
  table.fech-table td.mono{font-family:var(--mono);}
  table.fech-table td.dim{color:var(--ink-soft);}

  /* ---------- lista ---------- */
  .list-item{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:16px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .list-item .meta{display:flex;flex-direction:column;gap:3px;}
  .list-item .meta .top{font-weight:600;font-size:14px;color:var(--ink);}
  .list-item .meta .sub{font-size:12.5px;color:var(--ink-soft);font-family:var(--mono);}
  .list-item .right{display:flex;align-items:center;gap:14px;}
  .value{font-family:var(--mono);font-size:14px;}

  .stamp{
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 10px;border-radius:20px;border:1px solid; font-weight:600;
  }
  .stamp.pendente{color:var(--amber);border-color:var(--amber);background:var(--amber-light);}
  .stamp.conferido{color:var(--brown);border-color:var(--sage);background:var(--sage-light);}
  .stamp.divergente{color:var(--rust);border-color:var(--rust);background:var(--rust-light);}

  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
  }
  .empty h3{color:var(--ink);margin-bottom:8px;font-size:17px;}
  .empty p{font-size:13px;max-width:360px;margin:0 auto;}

  .detail-panel{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);
    width:min(700px, 92vw);max-height:86vh;background:var(--surface);
    border-radius:var(--radius);box-shadow:0 24px 64px rgba(0,0,0,.22);
    padding:36px 44px;overflow-y:auto;opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;z-index:50;
  }
  .detail-panel.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .overlay{
    position:fixed;inset:0;background:rgba(27,46,34,.3);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:40;
  }
  .overlay.open{opacity:1;pointer-events:auto;}
  .detail-panel h3{font-size:19px;color:var(--ink);margin-bottom:2px;}
  .detail-panel .close{position:absolute;top:22px;right:22px;cursor:pointer;color:var(--ink-soft);font-size:20px;background:none;border:none;}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--hairline);font-size:13px;gap:12px;}
  .kv span:first-child{color:var(--ink-soft);}
  .kv span:last-child{text-align:right;font-family:var(--mono);}
  .kv-group-title{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--brown);margin:20px 0 4px;font-weight:600;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--header-bg);color:#e8f0ec;padding:12px 20px;border-radius:var(--radius-sm);
    font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .hidden{display:none !important;}
  .loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:6px;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

  /* ---------- autocomplete ---------- */
  .ac-list{
    position:absolute;left:0;right:0;top:100%;margin-top:4px;z-index:30;
    background:var(--surface);border:1px solid var(--hairline-strong);border-radius:var(--radius-sm);
    max-height:440px;overflow-y:auto;box-shadow:0 10px 24px rgba(0,0,0,.12);
  }
  .ac-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--hairline);}
  .ac-item:last-child{border-bottom:none;}
  .ac-item:hover{background:var(--surface2);}
  .ac-item .ac-name{font-size:13px;font-weight:600;color:var(--ink);}
  .ac-item .ac-sub{font-size:11.5px;color:var(--ink-soft);font-family:var(--mono);}
  .ac-empty{padding:10px 12px;font-size:12.5px;color:var(--ink-soft);}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="login-eyebrow">Fechamento · Cadastro</div>
    <h1>Portal de Fechamentos</h1>
    <p>Acesso restrito às corretoras cadastradas junto à Brascof.</p>
    <form id="loginForm">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="loginEmail" required autocomplete="username">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary" type="submit">Entrar</button>
      <div id="loginErr" class="err hidden"></div>
    </form>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <div class="topbar">
    <div class="brand">
      <h1>Portal de Fechamentos</h1>
      <span id="corretoraTag">·</span>
    </div>
    <div class="who">
      <span id="userEmail"></span>
      <button id="logoutBtn">Sair</button>
    </div>
  </div>

  <div id="letterheadWrap"></div>

  <div class="shell">
    <div class="tabs" id="tabs"></div>
    <div id="tabContent"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detailPanel"></div>
<div class="toast" id="toast"></div>

<script>

function applyBrascofPayment(idPrefix, isVenda){

function updateRetiradaState(formRoot, isPosto){
  const body = formRoot.querySelector('.retirada-body');
  if(!body) return;
  body.querySelectorAll('input,select,textarea').forEach(inp=>{ inp.disabled = isPosto; });
  body.style.opacity = isPosto ? '0.4' : '1';
  body.style.pointerEvents = isPosto ? 'none' : 'auto';

let currentUser = null;
let currentProfile = null; // { corretora, role }
let currentTab = 'novo';
let fechamentosCache = [];
let contrapartesCache = [];
let armazensCache = [];
let corretoraConfigCache = []; // todas visíveis ao usuário (própria, ou todas se admin)
let myCorretoraConfig = null; // atalho para a config da própria corretora (corretor)
let solicitacoesExclusaoCache = [];
let solicitacoesEdicaoCache = [];

const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html!==undefined) e.innerHTML = html; return e; };

function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function fmtMoney(v){ return v==null ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function fmtDate(v){ if(!v) return '—'; const d = new Date(v+'T00:00:00'); return d.toLocaleDateString('pt-BR'); }

function onlyDigits(v){ return (v||'').replace(/\D/g,''); }
function formatCnpjCpf(v){
  const d = onlyDigits(v).slice(0,14);
  if(d.length <= 11){
    return d.replace(/^(\d{3})(\d)/,'$1.$2').replace(/^(\d{3})\.(\d{3})(\d)/,'$1.$2.$3').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  }
  return d.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2');
}
function formatCep(v){
  const d = onlyDigits(v).slice(0,8);
  return d.replace(/^(\d{5})(\d)/,'$1-$2');
}
function attachMask(inputEl, formatFn){
  inputEl.addEventListener('input', ()=>{
    const pos = inputEl.selectionStart;
    const before = inputEl.value.length;
    inputEl.value = formatFn(inputEl.value);
    const after = inputEl.value.length;
    inputEl.selectionEnd = Math.max(0, pos + (after - before));
  });
}

function formatMoneyLive(v){
  let raw = v.replace(/[^\d,]/g, '');
  const firstComma = raw.indexOf(',');
  if(firstComma !== -1) raw = raw.slice(0, firstComma+1) + raw.slice(firstComma+1).replace(/,/g, '');
  const parts = raw.split(',');
  let intPart = parts[0].replace(/^0+(?=\d)/, '');
  intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  let result = intPart;
  if(parts.length > 1) result += ',' + parts[1].slice(0,2);
  return result;
}
function formatMoneyBlur(v){
  const raw = v.replace(/[^\d,]/g, '');
  if(!raw) return '';
  const parts = raw.split(',');
  let intPart = (parts[0].replace(/^0+(?=\d)/, '') || '0');
  intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const dec = parts[1] ? parts[1].slice(0,2).padEnd(2,'0') : '00';
  return intPart + ',' + dec;
}
function formatIntegerLive(v){
  let digits = onlyDigits(v).replace(/^0+(?=\d)/, '');
  return digits.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}
function parseMoneyToNumber(str){
  if(!str) return null;
  const n = parseFloat(str.replace(/\./g,'').replace(',', '.'));
  return isNaN(n) ? null : n;
}
function parseIntegerToNumber(str){
  if(!str) return null;
  const n = parseInt(str.replace(/\./g,''), 10);
  return isNaN(n) ? null : n;
}
function attachMoneyMask(inputEl){
  inputEl.addEventListener('input', ()=>{ inputEl.value = formatMoneyLive(inputEl.value); });
  inputEl.addEventListener('blur', ()=>{ inputEl.value = formatMoneyBlur(inputEl.value); });
}
function attachIntegerMask(inputEl){
  inputEl.addEventListener('input', ()=>{ inputEl.value = formatIntegerLive(inputEl.value); });
}
function composeEndereco(item){
  const linha1 = [item.rua, item.numero].filter(Boolean).join(', ') + (item.bairro ? ' - ' + item.bairro : '');
  return [linha1.trim(), item.cep ? 'CEP ' + item.cep : ''].filter(Boolean).join(', ');
}
function composeCidadeUf(item){
  return [item.cidade, item.uf].filter(Boolean).join('/');
}

let bankListCache = null;
async function loadBankList(){
  if(bankListCache) return bankListCache;
  try {
    const res = await fetch('https://brasilapi.com.br/api/banks/v1');
    const data = await res.json();
    bankListCache = data
      .filter(b => b.code !== null && b.code !== undefined && (b.fullName || b.name))
      .map(b => ({ code: String(b.code).padStart(3,'0'), name: b.fullName || b.name }))
      .sort((a,b)=> a.code.localeCompare(b.code));
  } catch(e){
    bankListCache = [];
  }
  return bankListCache;
}

function attachBankAutocomplete(inputEl){
  const list = el('div','ac-list hidden');
  inputEl.parentElement.appendChild(list);

  function paint(banks, query){
    const q = query.trim().toLowerCase();
    if(!q){ list.classList.add('hidden'); list.innerHTML=''; return; }
    const matches = banks.filter(b => b.name.toLowerCase().includes(q) || b.code.includes(q)).slice(0,8);
    if(!matches.length){
      list.innerHTML = `<div class="ac-empty">Nenhum banco encontrado — pode digitar livremente.</div>`;
    } else {
      list.innerHTML = '';
      matches.forEach(b=>{
        const row = el('div','ac-item', `<div class="ac-name">${b.code} — ${b.name}</div>`);
        row.addEventListener('mousedown', (e)=>{ e.preventDefault(); inputEl.value = `${b.code} - ${b.name}`; list.classList.add('hidden'); });
        list.appendChild(row);
      });
    }
    list.classList.remove('hidden');
  }

  inputEl.addEventListener('input', async ()=>{
    const banks = await loadBankList();
    paint(banks, inputEl.value);
  });
  inputEl.addEventListener('focus', async ()=>{
    if(!inputEl.value) return;
    const banks = await loadBankList();
    paint(banks, inputEl.value);
  });
  inputEl.addEventListener('blur', ()=>setTimeout(()=>list.classList.add('hidden'), 120));
}

/* ---------------- AUTH ---------------- */
$('#loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email = $('#loginEmail').value.trim();
  const password = $('#loginPassword').value;
  $('#loginErr').classList.add('hidden');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    $('#loginErr').textContent = 'Não foi possível entrar: ' + error.message;
    $('#loginErr').classList.remove('hidden');
    return;
  }
  await afterLogin(data.user);
});

$('#logoutBtn').addEventListener('click', async ()=>{
  await sb.auth.signOut();
  location.reload();
});

async function afterLogin(user){
  currentUser = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !profile){
    $('#loginErr').textContent = 'Login válido, mas nenhum perfil de corretora foi encontrado para este usuário. Peça para a Brascof configurar seu acesso.';
    $('#loginErr').classList.remove('hidden');
    await sb.auth.signOut();
    return;
  }
  currentProfile = profile;
  $('#loginView').classList.add('hidden');
  $('#appView').classList.remove('hidden');
  $('#corretoraTag').textContent = profile.corretora + (profile.role === 'admin' ? ' · Brascof' : '');
  $('#userEmail').textContent = user.email;
  buildTabs();
  await Promise.all([loadFechamentos(), loadAuxData()]);
  renderLetterhead();
  renderTab();
}

async function upsertAuxRecords(payload){
  const corretora = currentProfile.corretora;
  const tasks = [];
  if(payload.vendedor_nome){
    tasks.push(sb.from('contrapartes').upsert({
      corretora,
      nome: payload.vendedor_nome,
      endereco: payload.vendedor_endereco,
      cidade: payload.vendedor_cidade,
      cnpj_cpf: payload.vendedor_cnpj_cpf,
      insc_est: payload.vendedor_insc_est
    }, { onConflict: 'corretora,nome' }));
  }
  if(payload.armazem_retirada_nome){
    tasks.push(sb.from('armazens').upsert({
      corretora,
      nome: payload.armazem_retirada_nome,
      endereco: payload.armazem_retirada_endereco,
      cidade: payload.armazem_retirada_cidade,
      cnpj: payload.armazem_retirada_cnpj
    }, { onConflict: 'corretora,nome' }));
  }
  if(payload.armazem_descarga_nome){
    tasks.push(sb.from('armazens').upsert({
      corretora,
      nome: payload.armazem_descarga_nome,
      endereco: payload.armazem_descarga_endereco,
      cidade: payload.armazem_descarga_cidade,
      cnpj: payload.armazem_descarga_cnpj
    }, { onConflict: 'corretora,nome' }));
  }
  if(tasks.length) await Promise.all(tasks);
  await loadAuxData();
}

/* ---------------- ESPELHO DE CORRETAGEM ---------------- */
function corretagemAplicavel(f){
  // Se a Brascof é vendedora, considera a corretagem do vendedor.
  // Se a Brascof é compradora, considera a corretagem do comprador.
  return f.tipo_operacao === 'venda' ? f.corretagem_vendedor_pct : f.corretagem_comprador_pct;
}
function valorCorretagem(f){
  const pct = corretagemAplicavel(f);
  if(pct === null || pct === undefined) return null;
  const total = (f.quantidade_sacas || 0) * (f.preco_por_saca || 0);
  return total * (Number(pct) / 100);
}

    : 'A corretagem paga considera sempre o lado em que a Brascof está no fechamento (compradora ou vendedora), sobre o valor total (sacas × preço/saca). Só aparecem aqui fechamentos já conferidos e liberados pela Brascof. Desmarque o que não quiser incluir no PDF desta vez.');

  searchWrap.style.cssText = 'flex:1;padding:11px 14px;border:1px solid var(--hairline-strong);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;background:#fff;';
  const pdfBtn = el('button','btn btn-primary','Baixar PDF do espelho');
  pdfBtn.type = 'button';
  pdfBtn.style.cssText = 'padding:0 20px;white-space:nowrap;';
  topRow.appendChild(searchWrap); topRow.appendChild(pdfBtn);
  container.appendChild(topRow);

  const totalWrap = el('div');
  totalWrap.style.cssText = 'margin-bottom:16px;';
  container.appendChild(totalWrap);

  const tableWrap = el('div','table-wrap');
  container.appendChild(tableWrap);

  function updateTotals(){
    const totalGeral = elegiveis.filter(f=>checkedIds.has(f.id)).reduce((s,f)=> s + (valorCorretagem(f) || 0), 0);
    const qtd = elegiveis.filter(f=>checkedIds.has(f.id)).length;

      <div class="meta"><div class="sub">TOTAL ${isAdmin ? 'A PAGAR ÀS CORRETORAS' : 'A RECEBER'} (${isAdmin ? 'INCLUÍDOS' : 'SELECIONADOS'})</div><div class="top" style="font-family:var(--mono);font-size:18px;">${fmtMoney(totalGeral)}</div></div>
      <div class="meta"><div class="sub">${isAdmin ? 'INCLUÍDOS' : 'SELECIONADOS'}</div><div class="top" style="font-family:var(--mono);font-size:18px;">${qtd} de ${elegiveis.length}</div></div>
    </div>`;
  }

  function paint(query){
    const q = (query || '').trim().toLowerCase();
    const items = q ? elegiveis.filter(f =>
      (f.numero_compra_brc||'').toLowerCase().includes(q) ||
      (f.numero_contrato_corretora||'').toLowerCase().includes(q) ||
      (f.vendedor_nome||'').toLowerCase().includes(q) ||
      (f.corretora||'').toLowerCase().includes(q) ||
      (f.data_pagamento||'').toLowerCase().includes(q)
    ) : elegiveis;

    updateTotals();

    tableWrap.innerHTML = '';
    if(!items.length){
      tableWrap.style.border = 'none';
      tableWrap.appendChild(el('div','empty', `
        <h3>Nada por aqui ainda</h3>
        <p>Assim que um fechamento com corretagem definida for conferido, ele aparece nesta lista.</p>
      `));
      return;
    }
    tableWrap.style.border = '';
    const table = el('table','fech-table');
    table.innerHTML = `
      <thead><tr>
        <th style="width:32px;"><input type="checkbox" id="checkAllCorretagem"></th>
        ${isAdmin ? '<th>Corretora</th>' : ''}
        <th>Contrato</th>
        <th>Contraparte</th>
        <th>Data pagamento</th>
        <th>Sacas</th>
        <th>Preço/saca</th>
        <th>Valor total</th>
        <th>% Corretagem</th>
        <th>Valor corretagem</th>
      </tr></thead>
    `;
    const tbody = el('tbody');
    items.forEach(f=>{
      const total = (f.quantidade_sacas || 0) * (f.preco_por_saca || 0);
      const pct = corretagemAplicavel(f);
      const valor = valorCorretagem(f);
      const tr = el('tr');
      tr.style.cursor = 'pointer';
      tr.innerHTML = `
        <td></td>
        ${isAdmin ? `<td class="dim">${f.corretora}</td>` : ''}
        <td class="mono strong">${f.numero_compra_brc || f.numero_contrato_corretora || '—'}</td>
        <td class="dim">${f.vendedor_nome || '—'}</td>
        <td class="mono dim">${f.data_pagamento || '—'}</td>
        <td class="mono">${f.quantidade_sacas}</td>
        <td class="mono">${fmtMoney(f.preco_por_saca)}</td>
        <td class="mono">${fmtMoney(total)}</td>
        <td class="mono">${pct}%</td>
        <td class="mono strong">${fmtMoney(valor)}</td>

      const check = el('input'); check.type = 'checkbox'; check.checked = checkedIds.has(f.id);
      check.addEventListener('click', (e)=>e.stopPropagation());
      check.addEventListener('change', async ()=>{
        if(check.checked) checkedIds.add(f.id); else checkedIds.delete(f.id);
        updateTotals();
        if(isAdmin){
          const { error } = await sb.from('fechamentos').update({ incluir_espelho: check.checked }).eq('id', f.id);

    table.appendChild(tbody);
    tableWrap.appendChild(table);

    const checkAll = $('#checkAllCorretagem');
    checkAll.checked = items.every(f=>checkedIds.has(f.id));
    checkAll.addEventListener('change', async ()=>{
      items.forEach(f=>{ if(checkAll.checked) checkedIds.add(f.id); else checkedIds.delete(f.id); });
      if(isAdmin){
        await Promise.all(items.map(f => sb.from('fechamentos').update({ incluir_espelho: checkAll.checked }).eq('id', f.id)));
        items.forEach(f => f.incluir_espelho = checkAll.checked);
      }
      paint(searchWrap.value);
    });
  }

  paint('');
  searchWrap.addEventListener('input', (e)=>paint(e.target.value));
  pdfBtn.addEventListener('click', ()=>generateCorretagemPdf(elegiveis.filter(f=>checkedIds.has(f.id)), isAdmin));

function generateCorretagemPdf(items, isAdmin){
  if(!items.length){ toast('Selecione ao menos um fechamento antes de gerar o PDF.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const marginX = 40;
  const pageRight = 555;
  const tableWidth = pageRight - marginX;
  let y = 50;
  const brown = [45,106,79];
  const inkSoft = [107,124,111];
  const darkInk = [27,46,34];

  const cfg = !isAdmin ? myCorretoraConfig : null;
  if(cfg && (cfg.logo_base64 || cfg.nome_completo)){
    if(cfg.logo_base64){
      const match = cfg.logo_base64.match(/^data:image\/(png|jpe?g);base64,/i);
      const format = match ? match[1].toUpperCase().replace('JPG','JPEG') : 'PNG';
      try{ doc.addImage(cfg.logo_base64, format, marginX, y, 55, 40); } catch(e){}
    }
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...darkInk);
    doc.text(cfg.nome_completo || cfg.corretora, marginX + (cfg.logo_base64?65:0), y+15);
    y += 48;
  }

  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(...brown);
  doc.text('Espelho de Corretagem', marginX, y+14);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(...inkSoft);
  doc.text(`Gerado em ${new Date().toLocaleDateString('pt-BR')}`, pageRight, y+14, { align:'right' });
  y += 24;
  doc.setDrawColor(...brown); doc.setLineWidth(1); doc.line(marginX, y, pageRight, y); y += 20;

  const cols = isAdmin
    ? [ ['Corretora',0.14], ['Contrato',0.11], ['Contraparte',0.22], ['Pagamento',0.09], ['Sacas',0.07], ['Preço/saca',0.1], ['Valor total',0.1], ['%',0.05], ['Corretagem',0.12] ]
    : [ ['Contrato',0.13], ['Contraparte',0.27], ['Pagamento',0.11], ['Sacas',0.08], ['Preço/saca',0.12], ['Valor total',0.12], ['%',0.06], ['Corretagem',0.11] ];

  const rowH = 20;
  const ensureSpace = (needed) => { if(y + needed > 800){ doc.addPage(); y = 50; } };

  const drawHeaderRow = () => {
    doc.setFillColor(...brown); doc.rect(marginX, y, tableWidth, rowH, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    let cx = marginX;
    cols.forEach(([label, frac])=>{
      doc.text(label.toUpperCase(), cx+6, y+13);
      cx += tableWidth*frac;
    });
    y += rowH;
  };

  ensureSpace(rowH*2);
  drawHeaderRow();

  let total = 0;
  items.forEach((f, i)=>{
    ensureSpace(rowH);
    const totalValor = (f.quantidade_sacas||0) * (f.preco_por_saca||0);
    const pct = corretagemAplicavel(f);
    const valor = valorCorretagem(f) || 0;
    total += valor;

    if(i % 2 === 1){ doc.setFillColor(238,241,236); doc.rect(marginX, y, tableWidth, rowH, 'F'); }
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...darkInk);
    const rowVals = isAdmin
      ? [f.corretora, f.numero_compra_brc||f.numero_contrato_corretora||'—', f.vendedor_nome||'—', f.data_pagamento||'—', String(f.quantidade_sacas), fmtMoney(f.preco_por_saca), fmtMoney(totalValor), pct+'%', fmtMoney(valor)]
      : [f.numero_compra_brc||f.numero_contrato_corretora||'—', f.vendedor_nome||'—', f.data_pagamento||'—', String(f.quantidade_sacas), fmtMoney(f.preco_por_saca), fmtMoney(totalValor), pct+'%', fmtMoney(valor)];

    let cx = marginX;
    rowVals.forEach((val, idx)=>{
      const frac = cols[idx][1];
      const colW = tableWidth*frac;
      let displayVal = String(val).toUpperCase();
      const avail = colW - 8;
      let fs = 8;
      doc.setFontSize(fs);
      while(doc.getTextWidth(displayVal) > avail && fs > 5){ fs -= 0.3; doc.setFontSize(fs); }
      while(displayVal.length > 1 && doc.getTextWidth(displayVal) > avail){ displayVal = displayVal.slice(0,-1); }
      doc.text(displayVal, cx+6, y+13);
      cx += colW;
    });
    doc.setDrawColor(216,227,220); doc.line(marginX, y+rowH, pageRight, y+rowH);
    y += rowH;
  });

  ensureSpace(rowH+10);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...brown);
  doc.text('TOTAL', marginX+6, y+16);
  doc.text(fmtMoney(total), pageRight-6, y+16, { align:'right' });
  y += 24;

  doc.save(`espelho_corretagem_${new Date().toISOString().slice(0,10)}.pdf`);
}

function formatMesAno(v){
  const digits = onlyDigits(v).slice(0,4);
  if(digits.length <= 2) return digits;
  return digits.slice(0,2) + '/' + digits.slice(2);
}
function formatMoneySignedLive(v){
  const neg = v.trim().startsWith('-');
  const body = formatMoneyLive(v.replace(/-/g,''));
  return (neg ? '-' : '') + body;
}
function formatMoneySignedBlur(v){
  const neg = v.trim().startsWith('-');
  const body = formatMoneyBlur(v.replace(/-/g,''));
  if(!body) return '';
  return (neg ? '-' : '') + body;
}

function parseFlexibleNumber(str){
  if(str === null || str === undefined) return null;
  let s = String(str).trim();
  if(!s) return null;
  let neg = false;
  if(s.startsWith('(') && s.endsWith(')')){ neg = true; s = s.slice(1,-1); }
  if(s.startsWith('-')){ neg = true; s = s.slice(1); }
  s = s.replace(/\s/g,'');
  if(s.includes(',') && s.includes('.')) s = s.replace(/\./g,'').replace(',', '.');
  else if(s.includes(',')) s = s.replace(',', '.');
  const n = parseFloat(s);
  if(isNaN(n)) return null;
  return neg ? -n : n;
}
function formatFlexibleNumberDisplay(n){
  if(n === null || n === undefined) return '';
  return String(n).replace('.', ',');
}

  toast(aprovar ? 'Exclusão aprovada e concluída.' : 'Solicitação recusada.');
  await loadAuxData();
  return true;
}

function getFieldDef(fieldId){
  for(const sec of FORM_SECTIONS){
    const f = sec.fields.find(fld=>fld.id===fieldId);
    if(f) return f;
  }
  return null;
}
function formatFieldValueForDiff(fieldId, value){
  if(value === null || value === undefined || value === '') return '—';
  const fd = getFieldDef(fieldId);
  if(fd && fd.mask === 'money') return fmtMoney(value);
  if(fd && fd.type === 'date') return fmtDate(value);
  if(fd && fd.type === 'select'){
    const opt = fd.options && fd.options.find(o=>o.value===value);
    if(opt) return opt.label;
  }
  return String(value);
}

      rejectBtn.addEventListener('click', async ()=>{
        approveBtn.disabled = true; rejectBtn.disabled = true;
        await resolveEditRequest(req, false);
        paint();
      });
      actions.appendChild(viewBtn); actions.appendChild(approveBtn); actions.appendChild(rejectBtn);
      row.appendChild(actions);
      body.appendChild(row);
    });
  }
  paint();

  outer.appendChild(card);
  return outer;
}

function buildAuxSection(title, table, fieldsDef, opts={}){
  const outer = el('div');
  const card = el('div','section-card');
  const head = el('div','section-head', `<h3>${title}</h3>`);
  const body = el('div','section-body');
  const inputs = {};
  fieldsDef.forEach(fd=>{
    const w = el('div','field' + (fd.full ? ' full' : ''));
    w.appendChild(el('label', null, fd.label + (fd.required ? ' *' : '')));
    const inp = el('input'); inp.type = 'text';
    if(fd.placeholder) inp.placeholder = fd.placeholder;
    if(fd.maxlength) inp.maxLength = fd.maxlength;
    inputs[fd.id] = inp;
    if(fd.mask === 'cep') attachMask(inp, formatCep);
    if(fd.mask === 'doc') attachMask(inp, formatCnpjCpf);
    w.appendChild(inp);
    body.appendChild(w);
  });
  let globalCheck = null;
  if(opts.globalToggle && currentProfile.role === 'admin'){
    const gw = el('div','field full');
    gw.style.cssText = 'display:flex;align-items:center;gap:8px;';
    globalCheck = el('input'); globalCheck.type = 'checkbox'; globalCheck.id = table + '_global_check';
    globalCheck.style.cssText = 'width:auto;margin:0;';
    const glbl = el('label', null, 'Compartilhado — visível para todas as corretoras');
    glbl.style.cssText = 'margin:0;cursor:pointer;';
    glbl.setAttribute('for', globalCheck.id);
    gw.appendChild(globalCheck); gw.appendChild(glbl);
    body.appendChild(gw);
  }
  card.appendChild(head); card.appendChild(body);

  /* ---------- Contas bancárias inline (só para contrapartes) ---------- */
  let getBankRowsData = () => [];
  if(opts.bankAccounts){
    const bankHead = el('div','section-head', `<h3 style="font-size:13px;">Contas bancárias</h3>`);
    bankHead.style.cssText = 'border-top:1px solid var(--hairline);background:transparent;padding-top:20px;';
    const bankBody = el('div');
    bankBody.style.cssText = 'padding:16px 22px 4px;';
    const rowsWrap = el('div');
    bankBody.appendChild(rowsWrap);

    const addRowBtn = el('button','btn btn-ghost','+ Adicionar outra conta');
    addRowBtn.type = 'button';
    addRowBtn.style.cssText = 'padding:7px 14px;font-size:12px;margin:6px 0 18px;';
    bankBody.appendChild(addRowBtn);

    const rows = [];
    function addBankRow(){
      const rowCard = el('div');
      rowCard.style.cssText = 'border:1px solid var(--hairline);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:#fff;position:relative;';
      const grid = el('div');
      grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;';
      const mk = (label, key, full, placeholder) => {
        const w = el('div','field' + (full ? ' full' : ''));
        w.style.marginBottom = '0';
        w.appendChild(el('label', null, label));
        const inp = el('input'); inp.type = 'text';
        if(placeholder) inp.placeholder = placeholder;
        w.appendChild(inp);
        grid.appendChild(w);
        return inp;
      };
      const rotuloInp = mk('Rótulo (ex: Conta principal)', 'rotulo', true);
      const favNomeInp = mk('Favorecido', 'favorecido_nome', true, 'preenche com o nome/razão social se deixar em branco');
      const favDocInp = mk('CNPJ/CPF do favorecido', 'favorecido_cnpj_cpf');
      attachMask(favDocInp, formatCnpjCpf);
      const bancoInp = mk('Banco', 'banco');
      attachBankAutocomplete(bancoInp);
      const agenciaInp = mk('Agência', 'agencia');
      const contaInp = mk('Conta', 'conta');
      const pixInp = mk('PIX', 'pix', true);
      rowCard.appendChild(grid);

      const entry = { rotuloInp, favNomeInp, favDocInp, bancoInp, agenciaInp, contaInp, pixInp, rowCard };
      rows.push(entry);

      if(rows.length > 1){
        const rmBtn = el('button','btn btn-ghost','Remover conta');
        rmBtn.type = 'button';
        rmBtn.style.cssText = 'padding:5px 10px;font-size:11px;margin-top:12px;';
        rmBtn.addEventListener('click', ()=>{
          rowCard.remove();
          const idx = rows.indexOf(entry);
          if(idx > -1) rows.splice(idx, 1);
        });
        rowCard.appendChild(rmBtn);
      }
      rowsWrap.appendChild(rowCard);
    }
    addRowBtn.addEventListener('click', addBankRow);
    addBankRow();

    inputs.nome.addEventListener('input', ()=>{
      rows.forEach(r=>{ r.favNomeInp.placeholder = inputs.nome.value || 'preenche com o nome/razão social se deixar em branco'; });
    });

    getBankRowsData = () => rows.map(r=>({
      rotulo: r.rotuloInp.value.trim() || null,
      favorecido_nome: r.favNomeInp.value.trim() || inputs.nome.value.trim() || null,
      favorecido_cnpj_cpf: r.favDocInp.value.trim() || null,
      banco: r.bancoInp.value.trim() || null,
      agencia: r.agenciaInp.value.trim() || null,
      conta: r.contaInp.value.trim() || null,
      pix: r.pixInp.value.trim() || null,
    })).filter(r => r.banco || r.agencia || r.conta || r.pix);

    card.appendChild(bankHead);
    card.appendChild(bankBody);

    outer._resetBankRows = () => {
      rowsWrap.innerHTML = '';
      rows.length = 0;
      addBankRow();
    };
  }

  const actions = el('div'); actions.style.cssText = 'padding:0 22px 22px;display:flex;justify-content:flex-end;';
  const saveBtn = el('button','btn btn-primary','Cadastrar');
  saveBtn.type = 'button';
  actions.appendChild(saveBtn);
  card.appendChild(actions);

  const listTitle = el('div', null, 'Já cadastrados');
  listTitle.style.cssText = 'font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin:20px 0 10px;';
  const searchInput = el('input'); searchInput.type = 'text'; searchInput.placeholder = 'Buscar...';
  searchInput.style.cssText = 'width:100%;padding:9px 12px;border:1px solid var(--hairline-strong);border-radius:var(--radius);font-family:Inter;font-size:13px;background:#fff;margin-bottom:14px;';
  const listWrap = el('div');

  function paintList(autoExpandNome){
    const cache = table === 'contrapartes' ? contrapartesCache : armazensCache;
    const q = searchInput.value.trim().toLowerCase();
    const items = q ? cache.filter(i=>(i.nome||'').toLowerCase().includes(q)) : cache;
    listWrap.innerHTML = '';
    if(!items.length){
      listWrap.appendChild(el('div',null,'<span style="font-size:12.5px;color:var(--ink-soft);">Nada encontrado.</span>'));
      return;
    }
    items.forEach(item=>{
      const rowWrap = el('div');
      rowWrap.style.marginBottom = '10px';
      const row = el('div','list-item');
      row.style.cursor = 'default';
      row.style.marginBottom = '0';
      const enderecoPreview = composeEndereco(item);
      row.appendChild(el('div','meta', `
        <div class="top">${item.nome} ${item.global ? '<span class="stamp conferido" style="font-size:9.5px;padding:2px 8px;margin-left:6px;">compartilhado</span>' : ''}</div>
        <div class="sub">${[currentProfile.role==='admin' ? item.corretora : null, composeCidadeUf(item), item.cnpj_cpf||item.cnpj].filter(Boolean).join(' · ') || '—'}</div>
        ${enderecoPreview ? `<div class="sub" style="opacity:.75;">${enderecoPreview}</div>` : ''}
      `));
      let bankBtn, bankPanel, loaded = false, expand;
      if(opts.bankAccounts){
        bankPanel = el('div','hidden');
        bankPanel.style.cssText = 'background:#eef1ec;border:1px solid var(--hairline);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:16px 20px;margin-top:-1px;';
        bankBtn = el('button','btn btn-ghost','🏦 Ver / gerenciar contas');
        bankBtn.type = 'button';
        bankBtn.style.cssText = 'padding:7px 14px;font-size:12px;flex-shrink:0;';
        expand = ()=>{
          bankPanel.classList.remove('hidden');
          bankBtn.textContent = '🏦 Fechar contas';
          if(!loaded){ loaded = true; renderBankAccountsPanel(bankPanel, item); }
          else { renderBankAccountsPanel(bankPanel, item); }
        };
        bankBtn.addEventListener('click', ()=>{
          const isHidden = bankPanel.classList.contains('hidden');
          if(isHidden){ expand(); }
          else { bankPanel.classList.add('hidden'); bankBtn.textContent = '🏦 Ver / gerenciar contas'; }
        });
        row.appendChild(bankBtn);
      }

      const pendingReq = solicitacoesExclusaoCache.find(r => r.tabela === table && r.registro_id === item.id);
      if(pendingReq){
        const tag = el('span', null, '🕓 exclusão pendente');
        tag.style.cssText = 'font-size:11px;color:var(--amber);flex-shrink:0;';
        row.appendChild(tag);
      } else if(currentProfile.role === 'admin'){
        const delBtn = el('button','btn btn-ghost','Excluir');
        delBtn.type = 'button';
        delBtn.style.cssText = 'padding:6px 12px;font-size:11.5px;color:var(--rust);border-color:var(--rust-light);flex-shrink:0;';
        delBtn.addEventListener('click', async (e)=>{
          e.stopPropagation();
          if(!confirm(`Excluir "${item.nome}" definitivamente? Essa ação não pode ser desfeita.`)) return;
          const ok = await adminDeleteRecord(table, item.id);
          if(ok){ await loadAuxData(); paintList(); }
        });
        row.appendChild(delBtn);
      } else if(item.corretora === currentProfile.corretora){
        const reqBtn = el('button','btn btn-ghost','Solicitar exclusão');
        reqBtn.type = 'button';
        reqBtn.style.cssText = 'padding:6px 12px;font-size:11.5px;color:var(--rust);border-color:var(--rust-light);flex-shrink:0;';
        reqBtn.addEventListener('click', async (e)=>{
          e.stopPropagation();
          const motivo = prompt('Motivo da exclusão (opcional):') || null;
          const { error } = await sb.from('solicitacoes_exclusao').insert({
            tabela: table, registro_id: item.id, descricao: item.nome, motivo,
            corretora: currentProfile.corretora, solicitado_por: currentUser.id
          });
          if(error){ toast('Erro ao solicitar: ' + error.message); return; }
          toast('Exclusão solicitada — aguardando aprovação da Brascof.');
          await loadAuxData();
          paintList();
        });
        row.appendChild(reqBtn);
      }

      rowWrap.appendChild(row);
      if(opts.bankAccounts) rowWrap.appendChild(bankPanel);
      listWrap.appendChild(rowWrap);
      if(opts.bankAccounts && autoExpandNome && item.nome === autoExpandNome){
        expand();
        setTimeout(()=>rowWrap.scrollIntoView({ behavior:'smooth', block:'center' }), 50);
      }
    });
  }
  searchInput.addEventListener('input', ()=>paintList());
  paintList();

  saveBtn.addEventListener('click', async ()=>{
    const payload = { corretora: currentProfile.corretora };
    fieldsDef.forEach(fd=>{ payload[fd.id] = inputs[fd.id].value.trim() || null; });
    if(globalCheck) payload.global = globalCheck.checked;
    if(!payload.nome){ toast('Preencha o nome antes de salvar.'); return; }
    saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';
    const { data, error } = await sb.from(table).upsert(payload, { onConflict:'corretora,nome' }).select().single();
    if(error){ saveBtn.disabled = false; saveBtn.textContent = 'Cadastrar'; toast('Erro ao salvar: ' + error.message); return; }

    const bankRows = getBankRowsData();
    if(bankRows.length){
      const { error: bankError } = await sb.from('contas_bancarias').insert(
        bankRows.map(r => ({ ...r, contraparte_id: data.id, corretora: currentProfile.corretora }))
      );
      if(bankError){ toast('Empresa salva, mas houve erro ao salvar contas: ' + bankError.message); }
    }
    saveBtn.disabled = false; saveBtn.textContent = 'Cadastrar';
    toast('Cadastrado com sucesso' + (bankRows.length ? ` (${bankRows.length} conta(s) bancária(s) incluída(s)).` : '.'));
    fieldsDef.forEach(fd=>{ inputs[fd.id].value = ''; });
    if(globalCheck) globalCheck.checked = false;
    if(outer._resetBankRows) outer._resetBankRows();
    await loadAuxData();
    paintList();
  });

  outer.appendChild(card);
  outer.appendChild(listTitle);
  outer.appendChild(searchInput);
  outer.appendChild(listWrap);
  return outer;
}

async function updatePaymentSection(formRoot, idPrefix, contraparteItem){
  const body = formRoot.querySelector('.payment-body');
  if(!body) return;
  const oldPicker = body.querySelector('.conta-picker-wrap');
  if(oldPicker) oldPicker.remove();

  const fillAccount = (c)=>{
    const map = { favorecido_nome:'favorecido_nome', favorecido_cnpj_cpf:'favorecido_cnpj_cpf', banco:'banco', agencia:'agencia', conta:'conta', pix:'pix' };
    Object.entries(map).forEach(([src,target])=>{
      const inp = document.getElementById(idPrefix+target);
      if(!inp) return;
      if(c){ inp.value = c[src] || ''; }
      else { inp.value = target === 'favorecido_nome' ? (contraparteItem.nome || '') : ''; }
    });
  };

  const contas = await fetchContasBancarias(contraparteItem.id);
  if(!contas.length){ fillAccount(null); return; }
  if(contas.length === 1){ fillAccount(contas[0]); return; }

  const wrap = el('div','field full conta-picker-wrap');
  wrap.appendChild(el('label', null, `Conta bancária cadastrada (${contas.length} encontradas)`));
  const select = el('select');
  contas.forEach((c,i)=>{
    const o = el('option', null, (c.rotulo || 'Conta ' + (i+1)) + (c.favorecido_nome ? ' — ' + c.favorecido_nome : ''));
    o.value = c.id;
    select.appendChild(o);
  });
  select.addEventListener('change', ()=>{
    fillAccount(contas.find(c=>c.id===select.value));
  });
  wrap.appendChild(select);
  body.insertBefore(wrap, body.firstChild);
  fillAccount(contas[0]);
}

function buildQuickAddForm(cfg, initialNome, onDone){
  const table = cfg.cache; // 'contrapartes' ou 'armazens'
  const wrap = el('div');

  const mk = (label, placeholder, full) => {

    if(label){

      w.appendChild(l);
    }
    const inp = el('input'); inp.type = 'text'; if(placeholder) inp.placeholder = placeholder;
    inp.style.cssText = 'width:100%;padding:8px 10px;border:1px solid var(--hairline-strong);border-radius:var(--radius-sm);font-size:13px;';

  const ruaInp = mkGrid(row1, 'Rua / logradouro');

  let rotuloInp, favNomeInp, favDocInp, bancoInp, agenciaInp, contaInp, pixInp;

    wrap.appendChild(bankTitle);

    const rowB1 = el('div'); rowB1.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;';
    rotuloInp = mkGrid(rowB1, 'Rótulo', 'ex: Conta principal');
    favNomeInp = mkGrid(rowB1, 'Favorecido (se diferente da empresa)');
    wrap.appendChild(rowB1);

    const rowB2 = el('div'); rowB2.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;';
    favDocInp = mkGrid(rowB2, 'CNPJ/CPF do favorecido'); attachMask(favDocInp, formatCnpjCpf);
    bancoInp = mkGrid(rowB2, 'Banco'); attachBankAutocomplete(bancoInp);
    wrap.appendChild(rowB2);

    const rowB3 = el('div'); rowB3.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;';

    contaInp = mkGrid(rowB3, 'Conta');
    pixInp = mkGrid(rowB3, 'PIX');
    wrap.appendChild(rowB3);
  }

  const hint = el('div', null, table === 'contrapartes' ? 'Dá pra cadastrar mais contas bancárias depois, na aba Cadastros.' : 'Depois dá pra completar mais detalhes na aba Cadastros.');
  hint.style.cssText = 'font-size:11px;color:var(--ink-soft);margin:8px 0;';

  const btnRow = el('div'); btnRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;';
  const cancelBtn = el('button','btn btn-ghost','Cancelar'); cancelBtn.type = 'button';
  cancelBtn.style.cssText = 'padding:6px 12px;font-size:12px;';
  const saveBtn = el('button','btn btn-primary','Salvar e usar'); saveBtn.type = 'button';
  saveBtn.style.cssText = 'padding:6px 12px;font-size:12px;';
  btnRow.appendChild(cancelBtn); btnRow.appendChild(saveBtn);
  wrap.appendChild(btnRow);

  cancelBtn.addEventListener('mousedown', (e)=>{ e.preventDefault(); onDone(null); });

    if(table === 'contrapartes' && (bancoInp.value.trim() || agenciaInp.value.trim() || contaInp.value.trim() || pixInp.value.trim())){

      if(bankError){ toast('Cadastro salvo, mas houve erro na conta bancária: ' + bankError.message); }
      else { bankSaved = true; }
    }

    saveBtn.disabled = false; saveBtn.textContent = 'Salvar e usar';
    await loadAuxData();
    toast('Cadastrado!' + (bankSaved ? ' Conta bancária incluída.' : '') + ' Já preenchido aqui — o resto do fechamento continua como estava.');
    onDone(data);
  });

  return wrap;
}

function attachAutocomplete(inputEl, cfg, idPrefix, formRoot){
  const list = el('div','ac-list hidden');
  inputEl.parentElement.appendChild(list);
  let quickAddOpen = false;

  function fillFrom(item){
    const values = cfg.fillFn(item);
    Object.entries(values).forEach(([targetSuffix, value])=>{
      const targetInput = document.getElementById(idPrefix + targetSuffix);
      if(targetInput) targetInput.value = value;
    });
    if(cfg.cache === 'contrapartes' && formRoot) updatePaymentSection(formRoot, idPrefix, item);
  }

  function paint(query){
    const q = query.trim().toLowerCase();
    if(!q){ list.classList.add('hidden'); list.innerHTML=''; return; }
    const cache = cfg.cache === 'contrapartes' ? contrapartesCache : armazensCache;
    const matches = cache.filter(item => (item.nome||'').toLowerCase().includes(q)).slice(0,6);
    list.innerHTML = '';
    if(!matches.length){
      list.appendChild(el('div','ac-empty', `Nenhum cadastro encontrado para "${inputEl.value.trim()}".`));
      const addBtn = el('button','btn btn-ghost','+ Cadastrar agora, sem sair daqui');
      addBtn.type = 'button';
      addBtn.style.cssText = 'margin:2px 12px 12px;padding:6px 12px;font-size:12px;';
      addBtn.addEventListener('mousedown', (e)=>{
        e.preventDefault();
        quickAddOpen = true;
        list.innerHTML = '';
        list.appendChild(buildQuickAddForm(cfg, inputEl.value.trim(), (savedItem)=>{
          quickAddOpen = false;
          if(savedItem){ fillFrom(savedItem); inputEl.value = savedItem.nome; }
          list.classList.add('hidden');
          list.innerHTML = '';
        }));
      });
      list.appendChild(addBtn);
    } else {
      matches.forEach(item=>{
        const row = el('div','ac-item', `<div class="ac-name">${item.nome}${item.global ? ' · <span style="color:var(--sage);">compartilhado</span>' : ''}</div><div class="ac-sub">${[item.cidade, item.cnpj_cpf||item.cnpj].filter(Boolean).join(' · ')}</div>`);
        row.addEventListener('mousedown', (e)=>{ e.preventDefault(); fillFrom(item); list.classList.add('hidden'); });
        list.appendChild(row);
      });
    }
    list.classList.remove('hidden');
  }

  inputEl.addEventListener('input', ()=>paint(inputEl.value));
  inputEl.addEventListener('focus', ()=>{ if(inputEl.value) paint(inputEl.value); });
  inputEl.addEventListener('blur', ()=>{
    if(quickAddOpen) return;
    setTimeout(()=>{ if(!quickAddOpen) list.classList.add('hidden'); }, 150);
  });
}

    const body = el('div','section-body' + (sec.num==='06' ? ' payment-body' : '') + (sec.num==='03' ? ' retirada-body' : ''));
    if(sec.num === '03'){
      const checkWrap = el('div','field full');
      checkWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
      const check = el('input'); check.type = 'checkbox'; check.id = 'f_armazem_retirada_mesmo';
      check.style.cssText = 'width:auto;margin:0;';
      const lbl = el('label', null, 'Retirada é no mesmo endereço do vendedor/comprador (contraparte)');
      lbl.style.cssText = 'margin:0;cursor:pointer;';
      lbl.setAttribute('for', 'f_armazem_retirada_mesmo');
      checkWrap.appendChild(check); checkWrap.appendChild(lbl);
      body.appendChild(checkWrap);
      check.addEventListener('change', ()=>{
        const nomeInput = form.querySelector('#f_armazem_retirada_nome');
        if(nomeInput) nomeInput.disabled = check.checked;
        body.querySelectorAll('.field').forEach(w=>{
          if(w === checkWrap) return;
          w.style.opacity = check.checked ? '0.4' : '1';
        });
      });
    }
    sec.fields.forEach(f=>{
      const wrap = el('div', 'field' + (f.full ? ' full' : '') + (f.hidden ? ' hidden' : ''));
      wrap.appendChild(el('label', null, f.label + (f.required ? ' *' : '')));
      let input;
      if(f.type === 'textarea'){
        input = el('textarea'); input.rows = 3;
      } else if(f.type === 'select'){
        input = el('select');
        f.options.forEach(opt=>{
          const o = el('option', null, opt.label); o.value = opt.value;
          input.appendChild(o);
        });
        if(f.default !== undefined) input.value = f.default;
      } else {
        input = el('input');
        input.type = f.type;
        if(f.step) input.step = f.step;
      }
      input.id = 'f_' + f.id;
      input.name = f.id;
      if(f.placeholder) input.placeholder = f.placeholder;
      if(f.required) input.required = true;
      if(f.mask === 'doc') attachMask(input, formatCnpjCpf);
      if(f.mask === 'money') attachMoneyMask(input);
      if(f.mask === 'integer') attachIntegerMask(input);
      wrap.appendChild(input);
      body.appendChild(wrap);
      const cfg = PICKER_CONFIG[sec.num];
      if(cfg && f.id === cfg.fieldMap.nome) attachAutocomplete(input, cfg, 'f_', form);
    });
    card.appendChild(head); card.appendChild(body);
    form.appendChild(card);
  });

  const opSelect = form.querySelector('#f_tipo_operacao');
  const opHead = form.querySelector('.op-dependent-head');
  function syncOpHead(){
    opHead.textContent = opSelect.value === 'venda' ? 'Comprador (contraparte)' : 'Vendedor (contraparte)';
  }
  opSelect.addEventListener('change', ()=>{
    syncOpHead();
    applyBrascofPayment('f_', opSelect.value === 'venda');
  });
  syncOpHead();

  const modalidadeSelect = form.querySelector('#f_modalidade');
  if(modalidadeSelect){
    modalidadeSelect.addEventListener('change', ()=>{
      updateRetiradaState(form, modalidadeSelect.value === 'FATURADO/POSTO');
    });
    updateRetiradaState(form, modalidadeSelect.value === 'FATURADO/POSTO');
  }

  const actions = el('div','form-actions');
  const submitBtn = el('button','btn btn-primary','Cadastrar fechamento');
  submitBtn.type = 'submit';
  actions.appendChild(submitBtn);
  form.appendChild(actions);

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const payload = { corretora: currentProfile.corretora, user_id: currentUser.id };
    FORM_SECTIONS.forEach(sec=>sec.fields.forEach(f=>{
      const raw = $('#f_'+f.id).value;
      if(raw === '') { payload[f.id] = null; return; }
      if(f.mask === 'money') payload[f.id] = parseMoneyToNumber(raw);
      else if(f.mask === 'integer') payload[f.id] = parseIntegerToNumber(raw);
      else payload[f.id] = (f.type === 'number') ? Number(raw) : raw;
    }));
    const mesmoRetirada = $('#f_armazem_retirada_mesmo');
    if(mesmoRetirada && mesmoRetirada.checked){
      payload.armazem_retirada_nome = payload.vendedor_nome;
      payload.armazem_retirada_endereco = payload.vendedor_endereco;
      payload.armazem_retirada_cidade = payload.vendedor_cidade;
      payload.armazem_retirada_cnpj = payload.vendedor_cnpj_cpf;
    }
    submitBtn.disabled = true; submitBtn.textContent = 'Enviando…';
    const { error } = await sb.from('fechamentos').insert(payload);
    submitBtn.disabled = false; submitBtn.textContent = 'Cadastrar fechamento';
    if(error){ toast('Erro ao cadastrar: ' + error.message); return; }
    toast('Fechamento cadastrado — aguardando conferência da Brascof.');
    form.reset();
    await Promise.all([loadFechamentos(), upsertAuxRecords(payload)]);
  });

  container.appendChild(form);
}

function openSplitModal(f){
  const modalOverlay = el('div');
  modalOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(27,46,34,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = el('div');
  box.style.cssText = 'background:var(--surface);border-radius:var(--radius);padding:28px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2);';

  const contratoBase = f.numero_compra_brc || f.numero_contrato_corretora || 'contrato';
  box.innerHTML = `
    <h3 style="margin-bottom:6px;">🪓 Dividir contrato — ${contratoBase}</h3>
    <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 20px;">Total original: ${f.quantidade_sacas} sacas · distribua entre as duas partes</p>
  `;

  const grid = el('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;';

  function buildPartCol(label){
    const col = el('div');
    col.style.cssText = 'background:var(--surface2);border-radius:8px;padding:16px;';
    const h = el('div', null, label);
    h.style.cssText = 'font-size:11px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;';
    col.appendChild(h);

    const mkField = (labelTxt, type) => {
      const w = el('div','field'); w.style.marginBottom = '10px';
      w.appendChild(el('label', null, labelTxt));
      const inp = el('input'); inp.type = type || 'text';
      w.appendChild(inp);
      col.appendChild(w);
      return inp;
    };
    const contratoInp = mkField('Contrato');
    const sacasInp = mkField('Sacas');
    const vencInp = mkField('Vencimento', 'date');
    return { col, contratoInp, sacasInp, vencInp };
  }

  const partA = buildPartCol('Parte A');
  const partB = buildPartCol('Parte B (saldo automático)');
  partA.contratoInp.value = contratoBase + ' A';
  partB.contratoInp.value = contratoBase + ' B';
  partA.vencInp.value = f.data_retirada_limite || '';
  partB.sacasInp.disabled = true;
  partB.sacasInp.style.background = 'var(--surface2)';
  partB.sacasInp.style.color = 'var(--ink-soft)';

  attachIntegerMask(partA.sacasInp);
  function updateB(){
    const aVal = parseIntegerToNumber(partA.sacasInp.value) || 0;
    const bVal = Math.max(f.quantidade_sacas - aVal, 0);
    partB.sacasInp.value = formatIntegerLive(String(bVal));
  }
  partA.sacasInp.addEventListener('input', updateB);
  partA.sacasInp.value = formatIntegerLive(String(Math.floor(f.quantidade_sacas / 2)));
  updateB();

  grid.appendChild(partA.col); grid.appendChild(partB.col);
  box.appendChild(grid);

  const actions = el('div');
  actions.style.cssText = 'display:flex;justify-content:flex-end;gap:10px;';
  const cancelBtn = el('button','btn btn-ghost','Cancelar'); cancelBtn.type = 'button';
  const confirmBtn = el('button','btn btn-primary','Confirmar divisão'); confirmBtn.type = 'button';
  actions.appendChild(cancelBtn); actions.appendChild(confirmBtn);
  box.appendChild(actions);

  modalOverlay.appendChild(box);
  document.body.appendChild(modalOverlay);

  cancelBtn.addEventListener('click', ()=>modalOverlay.remove());
  modalOverlay.addEventListener('click', (e)=>{ if(e.target===modalOverlay) modalOverlay.remove(); });

  confirmBtn.addEventListener('click', async ()=>{
    const aSacas = parseIntegerToNumber(partA.sacasInp.value) || 0;
    const bSacas = f.quantidade_sacas - aSacas;
    if(aSacas <= 0 || bSacas <= 0){ toast('Cada parte precisa ter pelo menos 1 saca.'); return; }
    if(!partA.contratoInp.value.trim() || !partB.contratoInp.value.trim()){ toast('Preencha o número do contrato das duas partes.'); return; }

    confirmBtn.disabled = true; confirmBtn.textContent = 'Dividindo…';

    const baseCopy = { ...f };
    delete baseCopy.id; delete baseCopy.created_at; delete baseCopy.updated_at;
    delete baseCopy.conferido_por; delete baseCopy.conferido_em; delete baseCopy.obs_conferencia;
    delete baseCopy.dividido; delete baseCopy.parent_fechamento_id;
    baseCopy.user_id = currentUser.id;

    const partAPayload = { ...baseCopy, numero_compra_brc: partA.contratoInp.value.trim(), quantidade_sacas: aSacas, data_retirada_limite: partA.vencInp.value || null, parent_fechamento_id: f.id };
    const partBPayload = { ...baseCopy, numero_compra_brc: partB.contratoInp.value.trim(), quantidade_sacas: bSacas, data_retirada_limite: partB.vencInp.value || null, parent_fechamento_id: f.id };

    const { error: errA } = await sb.from('fechamentos').insert(partAPayload);
    if(errA){ toast('Erro ao criar Parte A: ' + errA.message); confirmBtn.disabled=false; confirmBtn.textContent='Confirmar divisão'; return; }
    const { error: errB } = await sb.from('fechamentos').insert(partBPayload);
    if(errB){ toast('Erro ao criar Parte B: ' + errB.message); confirmBtn.disabled=false; confirmBtn.textContent='Confirmar divisão'; return; }

    const { error: errZero } = await sb.from('fechamentos').update({ quantidade_sacas: 0, dividido: true }).eq('id', f.id);
    if(errZero){ toast('Partes criadas, mas houve erro ao zerar o contrato original: ' + errZero.message); }
    else { toast('Contrato dividido com sucesso.'); }

    modalOverlay.remove();
    closeDetail();
    await loadFechamentos();
    renderTab();
  });
}
