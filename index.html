    <div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;">
      <div class="stamp ${f.status}" style="display:inline-block;">${f.status}</div>
      ${f.dividido ? '<span class="stamp" style="border-color:var(--hairline-strong);color:var(--ink-soft);background:transparent;">dividido</span>' : ''}
      ${f.status === 'conferido'
        ? '<button id="downloadPdfBtn" class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">Baixar PDF</button>'
        : '<button class="btn btn-ghost" disabled style="padding:6px 12px;font-size:12px;opacity:.45;cursor:not-allowed;">Baixar PDF</button>'}
      ${canEdit(f) ? '<button id="editBtn" class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">Editar</button>' : ''}
      ${(canRequestEdit(f) && !solicitacoesEdicaoCache.find(r=>r.fechamento_id===f.id)) ? '<button id="requestEditBtn" class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">Solicitar edição</button>' : ''}
      ${solicitacoesEdicaoCache.find(r=>r.fechamento_id===f.id) ? '<span class="stamp" style="border-color:var(--amber);color:var(--amber);background:var(--amber-light);">🕓 edição pendente</span>' : ''}
      ${(isAdmin && f.quantidade_sacas > 1 && !f.dividido) ? '<button id="splitBtn" class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">🪓 Dividir contrato</button>' : ''}
    </div>
    ${f.status !== 'conferido' ? '<p style="font-size:11.5px;color:var(--ink-soft);margin:6px 0 0;">O PDF libera assim que a Brascof conferir o fechamento.</p>' : ''}
    ${f.dividido ? '<p style="font-size:11.5px;color:var(--ink-soft);margin:6px 0 0;">Este contrato foi dividido em partes — as quantidades foram zeradas aqui para não duplicar no Espelho de Corretagem.</p>' : ''}
    ${f.parent_fechamento_id ? '<p style="font-size:11.5px;color:var(--ink-soft);margin:6px 0 0;">Parte de um contrato dividido.</p>' : ''}

    <div class="kv-group-title">Identificação</div>
    ${kv('Operação', f.tipo_operacao === 'venda' ? 'Brascof vendedora (BRV)' : 'Brascof compradora (BRC)')}
    ${kv('Contrato corretora', f.numero_contrato_corretora)}
    ${kv('Nº compra/venda', f.numero_compra_brc)}
    ${kv('Corretora', f.corretora)}
    ${kv('Data fechamento', fmtDate(f.data_fechamento))}

    ${(() => {
      const contraparteLabel = f.tipo_operacao === 'venda' ? 'Comprador (contraparte)' : 'Vendedor (contraparte)';
      const brascofLabel = f.tipo_operacao === 'venda' ? 'Vendedor' : 'Comprador';
      const brascofBlock = `
        <div class="kv-group-title">${brascofLabel} (Brascof)</div>
        ${kv('Nome', BRASCOF_INFO.nome)}
        ${kv('Endereço', BRASCOF_INFO.endereco)}
        ${kv('Cidade', BRASCOF_INFO.cidade)}
        ${kv('CNPJ', BRASCOF_INFO.cnpj)}
        ${kv('Insc. estadual', BRASCOF_INFO.insc_est)}
      `;
      const contraparteBlock = `
        <div class="kv-group-title">${contraparteLabel}</div>
        ${kv('Nome', f.vendedor_nome)}
        ${kv('Endereço', f.vendedor_endereco)}
        ${kv('Cidade', f.vendedor_cidade)}
        ${kv('CNPJ/CPF', f.vendedor_cnpj_cpf)}
        ${kv('Insc. estadual', f.vendedor_insc_est)}
      `;
      return f.tipo_operacao === 'venda'
        ? contraparteBlock + brascofBlock
        : brascofBlock + contraparteBlock;
    })()}

    <div class="kv-group-title">Condições</div>
    ${kv('Sacas', f.quantidade_sacas)}
    ${kv('Preço/saca', fmtMoney(f.preco_por_saca))}
    ${kv('Modalidade', f.modalidade)}
    ${kv('Safra', f.safra)}
    ${kv('Qualidade', f.descricao_qualidade)}
    ${kv('Retirada até', fmtDate(f.data_retirada_limite) + (f.data_retirada_obs ? ' · ' + f.data_retirada_obs : ''))}
    ${kv('Pagamento', f.data_pagamento)}
    ${kv('Corretagem C/V', (f.corretagem_comprador_pct ?? '—') + '% / ' + (f.corretagem_vendedor_pct ?? '—') + '%')}

    <div class="kv-group-title">Pagamento</div>
    ${kv('Favorecido', f.favorecido_nome)}
    ${kv('Banco/Ag/Conta', [f.banco,f.agencia,f.conta].filter(Boolean).join(' / '))}
    ${kv('PIX', f.pix)}

    ${f.observacoes ? `<div class="kv-group-title">Observações</div><div style="font-size:13px;color:var(--ink-soft);">${f.observacoes}</div>` : ''}

    <div id="internalDataSection" style="margin-top:24px;"></div>
    <div id="adminActions" style="margin-top:24px;"></div>
    <div id="deleteActions" style="margin-top:16px;"></div>
  `;
  $('#closeDetail').addEventListener('click', closeDetail);
  overlay.addEventListener('click', closeDetail);
  const pdfBtn = $('#downloadPdfBtn');
  if(pdfBtn) pdfBtn.addEventListener('click', ()=>generatePdf(f));
  const editBtn = $('#editBtn');
  if(editBtn) editBtn.addEventListener('click', ()=>openEditForm(f));
  const requestEditBtn = $('#requestEditBtn');
  if(requestEditBtn) requestEditBtn.addEventListener('click', ()=>openEditForm(f, true));
  const splitBtn = $('#splitBtn');
  if(splitBtn) splitBtn.addEventListener('click', ()=>openSplitModal(f));

  if(isAdmin){
    renderInternalDataSection($('#internalDataSection'), f.id);
  }

  if(isAdmin && f.status !== 'conferido'){
    const box = $('#adminActions');
    const confirmBtn = el('button','btn btn-primary','Marcar como conferido');
    confirmBtn.style.marginRight = '10px';
    const divergBtn = el('button','btn btn-ghost','Marcar divergência');
    box.appendChild(confirmBtn); box.appendChild(divergBtn);

    confirmBtn.addEventListener('click', async ()=>{
      await updateStatus(f.id, 'conferido');
    });
    divergBtn.addEventListener('click', async ()=>{
      const nota = prompt('Descreva a divergência encontrada:');
      if(nota === null) return;
      await updateStatus(f.id, 'divergente', nota);
    });
  }

  const delBox = $('#deleteActions');
  const pendingReq = solicitacoesExclusaoCache.find(r => r.tabela === 'fechamentos' && r.registro_id === f.id);
  if(pendingReq){
    delBox.innerHTML = `<p style="font-size:12px;color:var(--amber);">🕓 Exclusão solicitada em ${new Date(pendingReq.created_at).toLocaleDateString('pt-BR')} — aguardando aprovação da Brascof.</p>`;
  } else if(isAdmin){
    const delBtn = el('button','btn btn-ghost','Excluir fechamento');
    delBtn.style.cssText = 'padding:7px 14px;font-size:12px;color:var(--rust);border-color:var(--rust-light);';
    delBtn.addEventListener('click', async ()=>{
      if(!confirm(`Excluir definitivamente o fechamento ${f.numero_compra_brc || f.numero_contrato_corretora || ''}? Essa ação não pode ser desfeita.`)) return;
      const ok = await adminDeleteRecord('fechamentos', f.id);
      if(ok){ closeDetail(); await loadFechamentos(); renderTab(); }
    });
    delBox.appendChild(delBtn);
  } else if(f.corretora === currentProfile.corretora){
    if(f.status === 'pendente' || f.status === 'divergente'){
      const delBtn = el('button','btn btn-ghost','Excluir fechamento');
      delBtn.style.cssText = 'padding:7px 14px;font-size:12px;color:var(--rust);border-color:var(--rust-light);';
      delBtn.addEventListener('click', async ()=>{
        if(!confirm(`Excluir o fechamento ${f.numero_compra_brc || f.numero_contrato_corretora || ''}? Essa ação não pode ser desfeita.`)) return;
        const { error } = await sb.from('fechamentos').delete().eq('id', f.id);
        if(error){ toast('Erro ao excluir: ' + error.message); return; }
        toast('Excluído com sucesso.');
        closeDetail(); await loadFechamentos(); renderTab();
      });
      delBox.appendChild(delBtn);
    } else {
      const reqBtn = el('button','btn btn-ghost','Solicitar exclusão');
      reqBtn.style.cssText = 'padding:7px 14px;font-size:12px;color:var(--rust);border-color:var(--rust-light);';
      reqBtn.addEventListener('click', async ()=>{
        const motivo = prompt('Motivo da exclusão (opcional):') || null;
        const descricao = `${f.numero_compra_brc || f.numero_contrato_corretora || ''} · ${f.vendedor_nome || ''}`;
        const { error } = await sb.from('solicitacoes_exclusao').insert({
          tabela: 'fechamentos', registro_id: f.id, descricao, motivo,
          corretora: currentProfile.corretora, solicitado_por: currentUser.id
        });
        if(error){ toast('Erro ao solicitar: ' + error.message); return; }
        toast('Exclusão solicitada — aguardando aprovação da Brascof.');
        await loadAuxData();
        closeDetail();
      });
      delBox.appendChild(reqBtn);
    }
  }

  panel.classList.add('open'); overlay.classList.add('open');
}
function closeDetail(){ $('#detailPanel').classList.remove('open'); $('#overlay').classList.remove('open'); }

function canEdit(f){
  if(currentProfile.role === 'admin') return true;
  return f.corretora === currentProfile.corretora && (f.status === 'pendente' || f.status === 'divergente');
}
function canRequestEdit(f){
  return currentProfile.role !== 'admin' && f.corretora === currentProfile.corretora && f.status === 'conferido';
}

function openEditForm(f, isRequestMode){
  const panel = $('#detailPanel');
  panel.innerHTML = `<button class="close" id="closeDetail">&times;</button><h3>${isRequestMode ? 'Solicitar edição' : 'Editar fechamento'}</h3><p style="font-size:12.5px;color:var(--ink-soft);margin:4px 0 20px;">${f.vendedor_nome || ''}${isRequestMode ? ' — as alterações só valem depois que a Brascof aprovar.' : ''}</p><div id="editSections"></div>`;
  $('#closeDetail').addEventListener('click', closeDetail);
  const wrap = $('#editSections');

  FORM_SECTIONS.forEach(sec=>{
    const card = el('div','section-card');
    const head = el('div','section-head', `<span class="section-num">${sec.num}</span><h3${sec.num==='02' ? ' class="op-dependent-head"' : ''}>${sec.title}</h3>`);
    const body = el('div','section-body' + (sec.num==='06' ? ' payment-body' : '') + (sec.num==='03' ? ' retirada-body' : ''));
    let retiradaMesmoInicial = false;
    if(sec.num === '03'){
      const checkWrap = el('div','field full');
      checkWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
      const check = el('input'); check.type = 'checkbox'; check.id = 'e_armazem_retirada_mesmo';
      check.style.cssText = 'width:auto;margin:0;';
      retiradaMesmoInicial = !!(f.armazem_retirada_nome && f.armazem_retirada_nome === f.vendedor_nome);
      check.checked = retiradaMesmoInicial;
      const lbl = el('label', null, 'Retirada é no mesmo endereço do vendedor/comprador (contraparte)');
      lbl.style.cssText = 'margin:0;cursor:pointer;';
      lbl.setAttribute('for', 'e_armazem_retirada_mesmo');
      checkWrap.appendChild(check); checkWrap.appendChild(lbl);
      body.appendChild(checkWrap);
      check.addEventListener('change', ()=>{
        const nomeInput = wrap.querySelector('#e_armazem_retirada_nome');
        if(nomeInput) nomeInput.disabled = check.checked;
        body.querySelectorAll('.field').forEach(w=>{
          if(w === checkWrap) return;
          w.style.opacity = check.checked ? '0.4' : '1';
        });
      });
    }
    sec.fields.forEach(fld=>{
      const fieldWrap = el('div', 'field' + (fld.full ? ' full' : '') + (fld.hidden ? ' hidden' : ''));
      fieldWrap.appendChild(el('label', null, fld.label));
      let input;
      if(fld.type === 'textarea'){ input = el('textarea'); input.rows = 3; }
      else if(fld.type === 'select'){
        input = el('select');
        fld.options.forEach(opt=>{
          const o = el('option', null, opt.label); o.value = opt.value;
          input.appendChild(o);
        });
      }
      else { input = el('input'); input.type = fld.type; if(fld.step) input.step = fld.step; }
      input.id = 'e_' + fld.id;
      const val = f[fld.id];
      if(val !== null && val !== undefined){
        if(fld.mask === 'money') input.value = formatMoneyBlur(String(val).replace('.', ','));
        else if(fld.mask === 'integer') input.value = formatIntegerLive(String(val));
        else input.value = val;
      }
      if(fld.mask === 'doc') attachMask(input, formatCnpjCpf);
      if(fld.mask === 'money') attachMoneyMask(input);
      if(fld.mask === 'integer') attachIntegerMask(input);
      fieldWrap.appendChild(input);
      body.appendChild(fieldWrap);
      const cfg = PICKER_CONFIG[sec.num];
      if(cfg && fld.id === cfg.fieldMap.nome) attachAutocomplete(input, cfg, 'e_', wrap);
    });
    if(sec.num === '03' && retiradaMesmoInicial){
      const nomeInput = body.querySelector('#e_armazem_retirada_nome');
      if(nomeInput) nomeInput.disabled = true;
      body.querySelectorAll('.field').forEach(w=>{ w.style.opacity = '0.4'; });
      const checkWrap = body.querySelector('#e_armazem_retirada_mesmo').closest('.field');
      if(checkWrap) checkWrap.style.opacity = '1';
    }
    card.appendChild(head); card.appendChild(body);
    wrap.appendChild(card);
  });

  const opSelectEdit = wrap.querySelector('#e_tipo_operacao');
  const opHeadEdit = wrap.querySelector('.op-dependent-head');
  function syncOpHeadEdit(){
    opHeadEdit.textContent = opSelectEdit.value === 'venda' ? 'Comprador (contraparte)' : 'Vendedor (contraparte)';
  }
  opSelectEdit.addEventListener('change', ()=>{
    syncOpHeadEdit();
    applyBrascofPayment('e_', opSelectEdit.value === 'venda');
  });
  syncOpHeadEdit();

  const modalidadeSelectEdit = wrap.querySelector('#e_modalidade');
  if(modalidadeSelectEdit){
    modalidadeSelectEdit.addEventListener('change', ()=>{
      updateRetiradaState(wrap, modalidadeSelectEdit.value === 'FATURADO/POSTO');
    });
    updateRetiradaState(wrap, modalidadeSelectEdit.value === 'FATURADO/POSTO');
  }

  const actions = el('div','form-actions');
  actions.style.paddingBottom = '20px';
  const cancelBtn = el('button','btn btn-ghost','Cancelar');
  cancelBtn.type = 'button';
  cancelBtn.addEventListener('click', ()=>openDetail(f));
  const saveBtn = el('button','btn btn-primary', isRequestMode ? 'Enviar solicitação' : 'Salvar alterações');
  saveBtn.type = 'button';
  saveBtn.addEventListener('click', async ()=>{
    const payload = {};
    FORM_SECTIONS.forEach(sec=>sec.fields.forEach(fld=>{
      const raw = $('#e_'+fld.id).value;
      if(raw === ''){ payload[fld.id] = null; return; }
      if(fld.mask === 'money') payload[fld.id] = parseMoneyToNumber(raw);
      else if(fld.mask === 'integer') payload[fld.id] = parseIntegerToNumber(raw);
      else payload[fld.id] = (fld.type === 'number') ? Number(raw) : raw;
    }));
    const mesmoRetiradaEdit = $('#e_armazem_retirada_mesmo');
    if(mesmoRetiradaEdit && mesmoRetiradaEdit.checked){
      payload.armazem_retirada_nome = payload.vendedor_nome;
      payload.armazem_retirada_endereco = payload.vendedor_endereco;
      payload.armazem_retirada_cidade = payload.vendedor_cidade;
      payload.armazem_retirada_cnpj = payload.vendedor_cnpj_cpf;
    }

    if(isRequestMode){
      saveBtn.disabled = true; saveBtn.textContent = 'Enviando…';
      const motivo = prompt('Motivo da alteração (opcional):') || null;
      const descricao = `${f.numero_compra_brc || f.numero_contrato_corretora || ''} · ${f.vendedor_nome || ''}`;
      const { error } = await sb.from('solicitacoes_edicao').insert({
        fechamento_id: f.id, descricao, motivo, dados_propostos: payload,
        corretora: currentProfile.corretora, solicitado_por: currentUser.id
      });
      saveBtn.disabled = false; saveBtn.textContent = 'Enviar solicitação';
      if(error){ toast('Erro ao solicitar: ' + error.message); return; }
      toast('Edição solicitada — aguardando aprovação da Brascof.');
      await loadAuxData();
      renderTab();
      openDetail(f);
      return;
    }

    if(currentProfile.role !== 'admin' && f.status === 'divergente'){
      payload.status = 'pendente';
      payload.obs_conferencia = null;
    }
    saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';
    const { error } = await sb.from('fechamentos').update(payload).eq('id', f.id);
    saveBtn.disabled = false; saveBtn.textContent = 'Salvar alterações';
    if(error){ toast('Erro ao salvar: ' + error.message); return; }
    toast(payload.status === 'pendente' ? 'Corrigido e reenviado para conferência.' : 'Fechamento atualizado.');
    await Promise.all([loadFechamentos(), upsertAuxRecords(payload)]);
    const updated = fechamentosCache.find(x=>x.id===f.id) || f;
    renderTab();
    openDetail(updated);
  });
  actions.appendChild(cancelBtn); actions.appendChild(saveBtn);
  wrap.appendChild(actions);
}

async function generatePdf(f){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const marginX = 40;
  const pageRight = 555;
  const boxWidth = pageRight - marginX;
  let y = 50;
  const brown = [45,106,79];
  const inkSoft = [107,124,111];
  const darkInk = [27,46,34];

  const ensureSpace = (needed) => {
    if(y + needed > 800){ doc.addPage(); y = 50; }
  };

  const fitFontFor = (rows, currentMin) => {
    let fontSize = currentMin;
    rows.forEach(row=>{
      const totalWeight = row.reduce((s,c)=>s+(c.weight||1),0);
      row.forEach(cell=>{
        const cw = boxWidth * ((cell.weight||1)/totalWeight);
        const val = (cell.value===null||cell.value===undefined||cell.value==='') ? '—' : String(cell.value).toUpperCase();
        doc.setFont('helvetica','normal'); doc.setFontSize(6);
        const labelWidth = doc.getTextWidth(cell.label.toUpperCase() + ': ');
        const availWidth = Math.max(cw - 10 - labelWidth, 20);
        doc.setFont('helvetica','bold');
        let testSize = fontSize;
        doc.setFontSize(testSize);
        while(doc.getTextWidth(val) > availWidth && testSize > 6){
          testSize -= 0.25;
          doc.setFontSize(testSize);
        }
        fontSize = Math.min(fontSize, testSize);
      });
    });
    return fontSize;
  };

  const drawBox = (title, rows, fontSize) => {
    const ROW_H = 20;
    const totalHeight = 16 + rows.length * ROW_H;
    ensureSpace(totalHeight + 12);

    const boxTop = y;
    doc.setFillColor(...brown);
    doc.rect(marginX, y, boxWidth, 16, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
    doc.text(title.toUpperCase(), marginX+7, y+11);
    y += 16;

    rows.forEach(row=>{
      const totalWeight = row.reduce((s,c)=>s+(c.weight||1),0);
      let cx = marginX;
      row.forEach(cell=>{
        const cw = boxWidth * ((cell.weight||1)/totalWeight);
        const val = (cell.value===null||cell.value===undefined||cell.value==='') ? '—' : String(cell.value).toUpperCase();

        doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(...inkSoft);
        const labelText = cell.label.toUpperCase() + ': ';
        doc.text(labelText, cx+5, y+13);
        const labelWidth = doc.getTextWidth(labelText);
        const availWidth = Math.max(cw - 10 - labelWidth, 18);

        doc.setFont('helvetica','bold'); doc.setFontSize(fontSize); doc.setTextColor(...darkInk);
        let displayVal = val;
        if(doc.getTextWidth(displayVal) > availWidth){
          while(displayVal.length > 1 && doc.getTextWidth(displayVal + '…') > availWidth){
            displayVal = displayVal.slice(0, -1);
          }
          displayVal += '…';
        }
        doc.text(displayVal, cx+5+labelWidth, y+13);
        cx += cw;
      });
      y += ROW_H;
    });

    doc.setDrawColor(216,227,220);
    doc.rect(marginX, boxTop, boxWidth, y - boxTop);
    y += 12;
  };

  /* ---------- timbre da corretora ---------- */
  const cfg = corretoraConfigCache.find(c => c.corretora === f.corretora);
  let headerBottom = y;
  if(cfg && (cfg.logo_base64 || cfg.nome_completo)){
    let logoHeight = 0;
    if(cfg.logo_base64){
      const match = cfg.logo_base64.match(/^data:image\/(png|jpe?g);base64,/i);
      const format = match ? match[1].toUpperCase().replace('JPG','JPEG') : 'PNG';
      try{ doc.addImage(cfg.logo_base64, format, marginX, y, 70, 50); logoHeight = 50; }
      catch(e){ /* logo inválida, segue sem ela */ }
    }
    const textX = cfg.logo_base64 ? marginX + 82 : marginX;
    let ty = y + 10;
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(...darkInk);
    doc.text(cfg.nome_completo || f.corretora, textX, ty); ty += 15;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...inkSoft);
    [cfg.endereco, [cfg.cidade_uf, cfg.cep ? 'CEP '+cfg.cep : ''].filter(Boolean).join(' - '), cfg.telefone, cfg.cnpj ? 'CNPJ '+cfg.cnpj : '', cfg.extra_texto]
      .filter(Boolean).forEach(txt=>{ doc.text(txt, textX, ty); ty += 12; });
    headerBottom = Math.max(y + logoHeight, ty);
  }

  /* ---------- número / data no canto superior direito ---------- */
  let ry = y;
  doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(...brown);
  doc.text(f.numero_compra_brc || '—', pageRight, ry, { align:'right' }); ry += 13;
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...inkSoft);
  doc.text(`Contrato corretora: ${f.numero_contrato_corretora || '—'}`, pageRight, ry, { align:'right' }); ry += 11;
  doc.text(`Data do fechamento: ${fmtDate(f.data_fechamento)}`, pageRight, ry, { align:'right' }); ry += 11;
  doc.text(`Status: ${f.status.toUpperCase()}`, pageRight, ry, { align:'right' });

  y = Math.max(headerBottom, ry) + 14;
  doc.setDrawColor(...brown); doc.setLineWidth(1.2); doc.line(marginX, y, pageRight, y); y += 8;
  doc.setLineWidth(0.5);

  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(...brown);
  doc.text(`Fechamento de ${f.tipo_operacao === 'venda' ? 'Venda' : 'Compra'}`, marginX, y+14);
  y += 30;

  /* ---------- blocos das partes, na ordem: comprador > armazém descarga > vendedor > armazém retirada ---------- */
  const isVenda = f.tipo_operacao === 'venda';

  const brascofRows = [
    [ { label:'Nome', value: BRASCOF_INFO.nome, weight:2.3 }, { label:'CNPJ', value: BRASCOF_INFO.cnpj, weight:1.2 }, { label:'IE', value: BRASCOF_INFO.insc_est, weight:1.3 } ],
    [ { label:'Endereço', value: BRASCOF_INFO.rua, weight:1.8 }, { label:'Número', value: BRASCOF_INFO.numero, weight:1.6 }, { label:'Bairro', value: BRASCOF_INFO.bairro, weight:1.3 }, { label:'Cidade/UF', value: BRASCOF_INFO.cidadeUf, weight:1.5 }, { label:'CEP', value: BRASCOF_INFO.cep, weight:1 } ],
  ];
  const contraparteRows = [
    [ { label:'Nome', value: f.vendedor_nome, weight:2.3 }, { label:'CNPJ/CPF', value: f.vendedor_cnpj_cpf, weight:1.2 }, { label:'IE', value: f.vendedor_insc_est, weight:1.3 } ],
    [ { label:'Endereço', value: f.vendedor_rua, weight:1.8 }, { label:'Número', value: f.vendedor_numero, weight:1.6 }, { label:'Bairro', value: f.vendedor_bairro, weight:1.3 }, { label:'Cidade/UF', value: f.vendedor_cidade, weight:1.5 }, { label:'CEP', value: f.vendedor_cep, weight:1 } ],
  ];
  const armazemRows = (prefix) => ([
    [ { label:'Nome', value: f[prefix+'_nome'], weight:3 }, { label:'CNPJ', value: f[prefix+'_cnpj'], weight:1.5 } ],
    [ { label:'Endereço', value: f[prefix+'_rua'], weight:1.8 }, { label:'Número', value: f[prefix+'_numero'], weight:1.6 }, { label:'Bairro', value: f[prefix+'_bairro'], weight:1.3 }, { label:'Cidade/UF', value: f[prefix+'_cidade'], weight:1.5 }, { label:'CEP', value: f[prefix+'_cep'], weight:1 } ],
  ]);


  const boxesToRender = [
    { title:'Comprador', rows: isVenda ? contraparteRows : brascofRows },
    { title:'Armazém para descarga', rows: armazemRows('armazem_descarga') },
    { title:'Vendedor', rows: isVenda ? brascofRows : contraparteRows },
  ];
  if(f.modalidade !== 'FATURADO/POSTO'){
    boxesToRender.push({ title:'Armazém para retirada', rows: armazemRows('armazem_retirada') });
  }
  boxesToRender.push({ title:'Condições comerciais', rows: [
    [ { label:'Quantidade', value: f.quantidade_sacas + ' sacas', weight:1 }, { label:'Preço por saca', value: fmtMoney(f.preco_por_saca), weight:1 }, { label:'Modalidade', value: f.modalidade, weight:1 } ],
    [ { label:'Safra', value: f.safra, weight:1 }, { label:'Embalagem', value: f.embalagem, weight:1 }, { label:'Retirada até', value: fmtDate(f.data_retirada_limite) + (f.data_retirada_obs ? ' · ' + f.data_retirada_obs : ''), weight:1 } ],
    [ { label:'Qualidade / descrição', value: f.descricao_qualidade, weight:1 } ],
    [ { label:'Pagamento', value: f.data_pagamento, weight:1 }, { label:'Corretagem comprador', value: (f.corretagem_comprador_pct ?? '—') + '%', weight:1 }, { label:'Corretagem vendedor', value: (f.corretagem_vendedor_pct ?? '—') + '%', weight:1 } ],
  ]});
  boxesToRender.push({ title:'Dados para pagamento', rows: [
    [ { label:'Favorecido', value: f.favorecido_nome, weight:2.2 }, { label:'CNPJ/CPF', value: f.favorecido_cnpj_cpf, weight:1.2 }, { label:'Cidade', value: f.favorecido_cidade, weight:1 } ],
    [ { label:'Banco', value: f.banco, weight:2.4 }, { label:'Agência', value: f.agencia, weight:0.9 }, { label:'Conta', value: f.conta, weight:1.2 }, { label:'PIX', value: f.pix, weight:1.5 } ],
  ]});

  if(currentProfile.role === 'admin'){
    const internos = await fetchFechamentoInterno(f.id);
    if(internos){
      const iv = (fld) => fld.freeText ? internos[fld.id] : formatFlexibleNumberDisplay(internos[fld.id]);
      boxesToRender.push({ title:'Dados internos (Digisul) — só Brascof', rows: [
        [ { label:'Mês fixação', value: iv(INTERNAL_FIELDS[0]), weight:1 }, { label:'USD/BRL', value: iv(INTERNAL_FIELDS[1]), weight:1 }, { label:'KC', value: iv(INTERNAL_FIELDS[2]), weight:1 } ],
        [ { label:'Low Grade BRL/bag', value: iv(INTERNAL_FIELDS[3]), weight:1 }, { label:'EXP BRL/bag', value: iv(INTERNAL_FIELDS[4]), weight:1 }, { label:'17/18%', value: iv(INTERNAL_FIELDS[5]), weight:1 } ],
        [ { label:'Prêmio', value: iv(INTERNAL_FIELDS[6]), weight:1 }, { label:'13/16%', value: iv(INTERNAL_FIELDS[7]), weight:1 }, { label:'Offgrades %', value: iv(INTERNAL_FIELDS[8]), weight:1 } ],
        [ { label:'17/18 Diff', value: iv(INTERNAL_FIELDS[9]), weight:1 }, { label:'14/16 Diff', value: iv(INTERNAL_FIELDS[10]), weight:1 }, { label:'Bica Diff', value: iv(INTERNAL_FIELDS[11]), weight:1 } ],
      ]});
    }
  }

  // tamanho de fonte único pro fechamento inteiro, olhando todas as caixas de uma vez
  let globalFontSize = 9;
  boxesToRender.forEach(b=>{ globalFontSize = fitFontFor(b.rows, globalFontSize); });

  boxesToRender.forEach(b=>{ drawBox(b.title, b.rows, globalFontSize); });

  if(f.observacoes){
    ensureSpace(60);
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...brown);
    doc.text('OBSERVAÇÕES', marginX, y); y += 13;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...darkInk);
    const split = doc.splitTextToSize(f.observacoes, boxWidth);
    doc.text(split, marginX, y);
    y += split.length * 10.5 + 10;
  }

  if(f.status === 'divergente' && f.obs_conferencia){
    ensureSpace(60);
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(192,57,43);
    doc.text('DIVERGÊNCIA APONTADA PELA BRASCOF', marginX, y); y += 13;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(192,57,43);
    const split = doc.splitTextToSize(f.obs_conferencia, boxWidth);
    doc.text(split, marginX, y);
  }

  const fileSafe = (f.numero_compra_brc || f.numero_contrato_corretora || f.id).replace(/[^\w-]+/g,'_');
  doc.save(`fechamento_${fileSafe}.pdf`);
}

async function updateStatus(id, status, obs_conferencia){
  const payload = { status, conferido_por: currentUser.id, conferido_em: new Date().toISOString() };
  if(obs_conferencia !== undefined) payload.obs_conferencia = obs_conferencia;
  const { error } = await sb.from('fechamentos').update(payload).eq('id', id);
  if(error){ toast('Erro ao atualizar: ' + error.message); return; }
  toast('Status atualizado.');
  closeDetail();
  await loadFechamentos();
  renderTab();
}
</script>
</body>
</html>
